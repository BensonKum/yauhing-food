<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祐興食品 - 訂單核實</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }
  .header {
    background: #C8462B;
    color: white;
    padding: 1.5rem;
    text-align: center;
  }
  .header h1 { font-size: 1.4rem; font-weight: 700; }
  .header p { font-size: 0.8rem; opacity: 0.85; margin-top: 0.3rem; }

  .search-box {
    padding: 1.2rem;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 0.5rem;
  }
  .search-box input {
    flex: 1;
    padding: 0.8rem 1rem;
    border: 2px solid #eee;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: #C8462B; }
  .search-box button {
    padding: 0.8rem 1.2rem;
    background: #C8462B;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
  }
  .search-box button:hover { background: #A33A22; }

  .result { padding: 1.5rem; }
  .result-empty {
    text-align: center;
    color: #999;
    padding: 2rem;
    font-size: 0.9rem;
  }
  .result-card { border-radius: 12px; overflow: hidden; border: 2px solid #eee; }
  .result-card .card-header {
    background: #C8462B;
    color: white;
    padding: 1rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-header .order-id { font-weight: 700; font-size: 1.1rem; }
  .card-header .status-badge {
    padding: 0.3rem 0.8rem;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .status-badge.paid { background: #2E6A4F; }
  .status-badge.pending { background: #E07B3A; }
  .status-badge.shipped { background: #1565C0; }
  .status-badge.completed { background: #388E3C; }
  .status-badge.cancelled { background: #999; }

  .card-body { padding: 1.2rem; }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 0.6rem 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.88rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #888; }
  .info-value { font-weight: 600; color: #333; }
  .info-value.highlight { color: #C8462B; font-size: 1.1rem; }

  .items-section { margin-top: 1rem; }
  .items-title { font-size: 0.78rem; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .item-row {
    display: flex;
    justify-content: space-between;
    padding: 0.4rem 0;
    font-size: 0.85rem;
    color: #555;
  }
  .item-name { flex: 1; }
  .item-qty { color: #888; margin-right: 1rem; }
  .item-price { font-weight: 600; }

  .verified-badge {
    display: none;
    margin-top: 1rem;
    padding: 1rem;
    background: linear-gradient(135deg, #2E6A4F, #52B788);
    color: white;
    border-radius: 12px;
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
  }
  .verified-badge.show { display: block; }
  .verified-badge .sub { font-size: 0.8rem; opacity: 0.85; font-weight: 400; margin-top: 0.3rem; }

  .scan-section {
    margin-top: 1rem;
    padding: 1rem;
    background: #f8f4ef;
    border-radius: 12px;
    text-align: center;
  }
  .scan-section p { font-size: 0.78rem; color: #888; margin-bottom: 0.5rem; }
  #qrcode { display: inline-block; margin: 0.5rem auto; }
  #qrcode canvas { border-radius: 8px; }

  .scan-btn-section {
    padding: 0 1.2rem 1rem;
    text-align: center;
  }
  .scan-btn-section button {
    width: 100%;
    padding: 0.8rem;
    background: #333;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
  }
  .scan-btn-section button:hover { background: #555; }
  #reader video { border-radius: 12px; }
</style>
</head>
<body>
<!-- QR Code library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<div class="container">
  <div class="header">
    <h1>🏪 祐興食品 訂單核實</h1>
    <p>輸入訂單編號或掃描 QR Code</p>
  </div>

  <div class="search-box">
    <input type="text" id="orderInput" placeholder="例如：YH20260413001" onkeydown="if(event.key==='Enter')searchOrder()">
    <button onclick="searchOrder()">🔍 查詢</button>
  </div>

  <div class="scan-btn-section">
    <button id="scanBtn" onclick="startScanner()">📷 掃描 QR Code</button>
    <div id="reader" style="display:none; margin-top:1rem;"></div>
  </div>

  <div class="result" id="result">
    <div class="result-empty">請輸入訂單編號查詢</div>
  </div>
</div>

<script>
// ── Firebase SDK ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAeRezKIwd93M1CHc-JtKFKIYtGAW9mVFk",
  authDomain: "yauhing-food.firebaseapp.com",
  projectId: "yauhing-food",
  storageBucket: "yauhing-food.firebasestorage.app",
  messagingSenderId: "215564521673",
  appId: "1:215564521673:web:2529129a767231e348bd18",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const STATUS_MAP = {
  pending: { label: "💳 待付款", cls: "pending" },
  paid:    { label: "✅ 已付款", cls: "paid" },
  shipped: { label: "📦 已發貨", cls: "shipped" },
  completed: { label: "🎉 已完成", cls: "completed" },
  cancelled:{ label: "❌ 已取消", cls: "cancelled" },
};

const PICKUP_SHOPS = {
  "[1] 中環街市1樓P04C舖": "① 中環街市1樓P04C舖",
  "[2] 旺角始創中心地下KIOSK J舖": "② 旺角始創中心地下KIOSK J舖",
};

function renderStatus(status) {
  const s = STATUS_MAP[status] || STATUS_MAP.pending;
  return `<span class="status-badge ${s.cls}">${s.label}</span>`;
}

async function searchOrder() {
  const input = document.getElementById("orderInput").value.trim();
  if (!input) return;

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = '<div class="result-empty">🔄 查詢中...</div>';

  try {
    const snap = await db.collection("orders")
      .where("orderId", "==", input)
      .get();

    if (snap.empty) {
      // Try partial match
      const snap2 = await db.collection("orders")
        .orderBy("createdAt", "desc")
        .limit(20)
        .get();
      const found = snap2.docs.find(d => d.data().orderId && d.data().orderId.includes(input));
      if (found) {
        renderOrder(found.data(), found.id);
      } else {
        resultDiv.innerHTML = `<div class="result-empty">❌ 找不到訂單：${input}<br><br>請確認訂單編號是否正確</div>`;
      }
      return;
    }

    const doc = snap.docs[0];
    renderOrder(doc.data(), doc.id);
  } catch (e) {
    resultDiv.innerHTML = `<div class="result-empty">⚠️ 查詢失敗：${e.message}</div>`;
  }
}

function renderOrder(data, docId) {
  const resultDiv = document.getElementById("result");
  const status = data.status || "pending";
  const pickup = PICKUP_SHOPS[data.pickupShop] || data.pickupShop || "";

  const itemsHtml = (data.items || []).map(item => `
    <div class="item-row">
      <span class="item-name">${item.name || item}${item.variant ? ` (${item.variant})` : ""}</span>
      <span class="item-qty">×${item.qty}</span>
      <span class="item-price">HK$${item.qty * item.price}</span>
    </div>
  `).join("");

  const isPaid = status === "paid" || status === "shipped" || status === "completed";
  const shopName = data.deliveryMethod === "自取" ? "（自取）" : "（順豐）";

  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="card-header">
        <span class="order-id">#${data.orderId || docId}</span>
        ${renderStatus(status)}
      </div>
      <div class="card-body">
        <div class="info-row">
          <span class="info-label">顧客名稱</span>
          <span class="info-value">${data.customerName || "-"}</span>
        </div>
        <div class="info-row">
          <span class="info-label">聯絡電話</span>
          <span class="info-value">${data.customerPhone || "-"}</span>
        </div>
        <div class="info-row">
          <span class="info-label">配送方式</span>
          <span class="info-value">${data.deliveryMethod || "-"} ${pickup}</span>
        </div>
        ${data.deliveryMethod === "順豐" ? `
        <div class="info-row">
          <span class="info-label">收件地址</span>
          <span class="info-value" style="font-size:0.8rem">${data.sfAddress || "-"}</span>
        </div>` : ""}
        <div class="info-row">
          <span class="info-label">實付金額</span>
          <span class="info-value highlight">HK$${data.finalTotal || data.total || 0}</span>
        </div>
        ${data.discount > 0 ? `
        <div class="info-row">
          <span class="info-label">會員折扣</span>
          <span class="info-value" style="color:#2E6A4F">-HK$${data.discount}</span>
        </div>` : ""}
        <div class="info-row">
          <span class="info-label">訂單時間</span>
          <span class="info-value" style="font-size:0.8rem">${data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString("zh-HK") : "-"}</span>
        </div>

        <div class="items-section">
          <div class="items-title">📦 訂購商品</div>
          ${itemsHtml}
        </div>

        ${isPaid ? `
        <div class="verified-badge show">
          ✅ 確認為有效已付款訂單
          <div class="sub">顧客：${data.customerName || "-"}｜金額：HK$${data.finalTotal || data.total || 0}</div>
        </div>` : `
        <div class="scan-section">
          <p>⚠️ 此訂單尚未付款，請確認顧客已完成轉數快付款</p>
        </div>`}
      </div>
    </div>
  `;

  // Generate QR code
  const orderId = data.orderId || docId;
  const qrDiv = document.getElementById("qrcode");
  if (qrDiv) {
    qrDiv.innerHTML = "";
    const qr = qrcode(0, "M");
    qr.addData(orderId);
    qr.make();
    qrDiv.innerHTML = qr.createSvgTag(6, 4);
  }
}

// ── QR Scanner ──────────────────────────────────────────
let html5QrCode = null;

async function startScanner() {
  const btn = document.getElementById("scanBtn");
  const readerDiv = document.getElementById("reader");

  if (html5QrCode && html5QrCode.isScanning) {
    // Stop scanner
    await html5QrCode.stop();
    readerDiv.style.display = "none";
    btn.textContent = "📷 掃描 QR Code";
    btn.style.background = "#333";
    return;
  }

  // Start scanner
  readerDiv.style.display = "block";
  btn.textContent = "⏹️ 停止掃描";
  btn.style.background = "#C8462B";

  try {
    html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      onScanFailure
    );
  } catch (e) {
    alert("無法啟動相機：" + e.message);
    readerDiv.style.display = "none";
    btn.textContent = "📷 掃描 QR Code";
    btn.style.background = "#333";
  }
}

function onScanSuccess(decodedText) {
  // Parse QR content: YH-PICKUP:orderId|name|phone|total
  let orderId = decodedText;

  if (decodedText.startsWith("YH-PICKUP:")) {
    const parts = decodedText.split("|");
    orderId = parts[0].replace("YH-PICKUP:", "");
  }

  // Stop scanner
  if (html5QrCode && html5QrCode.isScanning) {
    html5QrCode.stop();
    document.getElementById("reader").style.display = "none";
    const btn = document.getElementById("scanBtn");
    btn.textContent = "📷 掃描 QR Code";
    btn.style.background = "#333";
  }

  // Fill input and search
  document.getElementById("orderInput").value = orderId;
  searchOrder();
}

function onScanFailure(error) {
  // Ignore scan failures (happens frequently)
}
</script>
</body>
</html>
