<style>
:root{--bg:#F5F0EB;--white:#fff;--a:#C8462B;--a2:#E07B3A;--a3:#2E6A4F;--txt:#2D2D2D;--muted:#6B6B6B;--bd:#E0D8C8;--warn:#FFC107;--r:14px;--sh:0 2px 8px rgba(0,0,0,.08);--tr:all .25s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ���� LOGIN �������������������������������������������������������������� */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--white);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--sh)}
.login-logo{font-size:1.5rem;font-weight:700;color:var(--a);text-align:center;margin-bottom:.3rem}
.login-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:2rem}
.login-field{margin-bottom:1rem}
.login-label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:.4rem;font-weight:500}
.login-input{width:100%;padding:.75rem .9rem;border:2px solid var(--bd);border-radius:10px;font-size:.95rem;font-family:inherit;outline:none;transition:var(--tr)}
.login-input:focus{border-color:var(--a)}
.login-btn{width:100%;padding:.8rem;background:var(--a);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr)}
.login-btn:hover{background:#A33A22}
.login-error{color:var(--a);font-size:.82rem;margin-top:.6rem;text-align:center;display:none}
.login-btn:disabled{opacity:.6;cursor:not-allowed}

/* ���� LAYOUT ������������������������������������������������������������ */
.admin-wrap{display:none;min-height:100vh}
.admin-wrap.show{display:block}

/* ���� TOPBAR ���������������������������������������������������������� */
.topbar{background:var(--white);border-bottom:1px solid var(--bd);padding:.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:1rem}
.topbar-logo{font-weight:700;font-size:1.1rem;color:var(--a)}
.topbar-badge{display:inline-block;padding:.2rem .6rem;background:var(--bg);border-radius:50px;font-size:.7rem;font-weight:600;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:.8rem}
.topbar-user{font-size:.85rem;color:var(--muted)}
.topbar-logout{background:none;border:1.5px solid var(--bd);padding:.45rem .9rem;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:var(--tr)}
.topbar-logout:hover{background:var(--a);color:white;border-color:var(--a)}

/* ���� STATS ������������������������������������������������������������ */
.stats{padding:1.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}
.stat-card{background:var(--white);border-radius:14px;padding:1.1rem;border:1px solid var(--bd)}
.stat-label{font-size:.75rem;color:var(--muted);margin-bottom:.4rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:1.8rem;font-weight:700;color:var(--txt)}
.stat-value.red{color:var(--a)}
.stat-value.green{color:var(--a3)}

/* ���� TABS ������������������������������������������������������������ */
.tabs{padding:0 1.5rem;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:.9rem 1.2rem;font-size:.88rem;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:var(--tr);font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--a);border-bottom-color:var(--a)}

/* ���� PANELS �������������������������������������������������������� */
.panel{display:none;padding:1.5rem}
.panel.active{display:block}

/* ���� FILTER BAR ���������������������������������������������� */
.filter-bar{display:flex;flex-wrap:wrap;gap:.7rem;margin-bottom:1.2rem;align-items:center}
.filter-bar select,.filter-bar input{padding:.55rem .9rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.85rem;font-family:inherit;background:white;outline:none;transition:var(--tr)}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--a)}
.filter-bar input{width:180px}
.filter-reset{background:none;border:1.5px solid var(--bd);padding:.55rem .9rem;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:var(--tr)}
.filter-reset:hover{background:var(--a);color:white;border-color:var(--a)}

/* ���� ORDER TABLE �������������������������������������������� */
.order-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--bd);background:var(--white)}
.order-table{width:100%;border-collapse:collapse;font-size:.85rem;min-width:700px}
.order-table th{background:#F5F0EB;padding:.7rem .9rem;text-align:left;font-weight:600;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.order-table td{padding:.75rem .9rem;border-top:1px solid #F0EBE0;vertical-align:middle}
.order-table tr:hover td{background:#FAFAF5}
.order-id{font-weight:700;color:var(--a);font-size:.82rem}
.order-status{display:inline-block;padding:.22rem .65rem;border-radius:50px;font-size:.72rem;font-weight:600}
.order-status.pending{background:#FFF3CD;color:#856404}
.order-status.paid{background:#D4EDDA;color:#155724}
.order-status.shipped{background:#CCE5FF;color:#004085}
.order-status.completed{background:#E8F5E9;color:#2E7D32}
.order-status.cancelled{background:#F8F8F8;color:#888;text-decoration:line-through}
.order-items{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.confirm-btn{padding:.45rem .9rem;background:var(--a3);color:white;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr)}
.confirm-btn:hover{background:#1B5E3A}
.confirm-btn:disabled{background:#ccc;cursor:not-allowed}
.order-table tr.processing td{background:#FFF9E6}

/* ���� ACCOUNTS ������������������������������������������������ */
.acct-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.acct-add-btn{padding:.7rem 1.2rem;background:var(--a);color:white;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr)}
.acct-add-btn:hover{background:#A33A22}
.acct-table{background:var(--white);border-radius:12px;border:1px solid var(--bd);overflow:hidden}
.acct-table table{width:100%;border-collapse:collapse}
.acct-table th{background:#F5F0EB;padding:.7rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase}
.acct-table td{padding:.75rem 1rem;border-top:1px solid #F0EBE0;font-size:.85rem;vertical-align:middle}
.acct-role{display:inline-block;padding:.2rem .55rem;border-radius:50px;font-size:.7rem;font-weight:600}
.acct-role.admin{background:#FCE4EC;color:#880E4F}
.acct-role.central{background:#E3F2FD;color:#0D47A1}
.acct-role.pioneer{background:#FFF3E0;color:#E65100}
.acct-active{color:var(--a3);font-weight:600}
.acct-inactive{color:#999}
.acct-actions{display:flex;gap:.4rem}
.acct-btn{padding:.35rem .7rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;transition:var(--tr);border:1.5px solid var(--bd);background:white}
.acct-btn:hover{background:var(--a);color:white;border-color:var(--a)}
.acct-btn.danger:hover{background:var(--a2);border-color:var(--a2)}

/* ���� MODAL ������������������������������������������������������ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;color:var(--txt)}
.modal-field{margin-bottom:1rem}
.modal-label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:.4rem;font-weight:500}
.modal-input{width:100%;padding:.7rem .9rem;border:2px solid var(--bd);border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:var(--tr)}
.modal-input:focus{border-color:var(--a)}
.modal-select{width:100%;padding:.7rem .9rem;border:2px solid var(--bd);border-radius:10px;font-size:.9rem;font-family:inherit;background:white;outline:none}
.modal-actions{display:flex;gap:.7rem;margin-top:1.5rem}
.modal-cancel{flex:1;padding:.7rem;border:2px solid var(--bd);border-radius:10px;background:white;font-size:.9rem;cursor:pointer;font-family:inherit;transition:var(--tr)}
.modal-cancel:hover{background:var(--bg)}
.modal-save{flex:1;padding:.7rem;background:var(--a);color:white;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr)}
.modal-save:hover{background:#A33A22}
.modal-save:disabled{opacity:.6;cursor:not-allowed}
.modal-msg{font-size:.8rem;margin-top:.7rem;display:none}
.modal-msg.err{color:var(--a)}
.modal-msg.ok{color:var(--a3)}

/* ���� LOADING ���������������������������������������������������� */
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid #F0EBE0;border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row td{color:var(--muted);font-style:italic}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.9rem}
.empty-state svg{width:48px;height:48px;margin-bottom:.8rem;opacity:.3}

/* 打卡系統 */
.clock-section{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem}
.clock-card{background:var(--white);border-radius:14px;padding:1.3rem;border:1px solid var(--bd)}
.clock-card-title{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem}

.emp-list{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.emp-btn{padding:.55rem 1rem;border:2px solid var(--bd);border-radius:50px;font-size:.85rem;cursor:pointer;font-family:inherit;background:white;color:var(--txt);transition:var(--tr);font-weight:500}
.emp-btn:hover{border-color:var(--a);color:var(--a)}
.emp-btn.active{border-color:var(--a);background:var(--a);color:white}
.emp-btn.clocked{background:#D4EDDA;border-color:var(--a3);color:var(--a3)}
.emp-btn.clocked.active{background:var(--a3);color:white}
.pin-row{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem}
.pin-input{flex:1;padding:.7rem .9rem;border:2px solid var(--bd);border-radius:10px;font-size:1.1rem;font-family:inherit;outline:none;letter-spacing:.2em;text-align:center;transition:var(--tr)}
.pin-input:focus{border-color:var(--a)}
.clock-btn{width:100%;padding:1rem;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);color:white}
.clock-btn.clock-in{background:var(--a3)}
.clock-btn.clock-in:hover{background:#1B5E3A}
.clock-btn.clock-out{background:var(--a2)}
.clock-btn.clock-out:hover{background:#C4622A}
.clock-btn:disabled{background:#ccc;cursor:not-allowed}
.clock-status{text-align:center;padding:.8rem;background:#F5F0EB;border-radius:10px;margin-top:.8rem;font-size:.85rem}
.clock-status.on{background:#D4EDDA;color:var(--a3)}
.clock-status.off{background:#FFF3CD;color:#856404}

/* 打卡記錄 */
.clock-record-card{background:var(--white);border-radius:14px;padding:1.1rem;border:1px solid var(--bd)}
.clock-record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
.clock-record-title{font-size:.9rem;font-weight:700}
.clock-table{width:100%;border-collapse:collapse;font-size:.82rem}
.clock-table th{background:#F5F0EB;padding:.6rem .8rem;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase}
.clock-table td{padding:.65rem .8rem;border-top:1px solid #F0EBE0;vertical-align:middle}
.clock-emp{font-weight:600;color:var(--txt)}
.clock-store{font-size:.75rem;color:var(--muted)}

/* 員工管理 */

.emp-manage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}

.emp-manage-info{font-size:.78rem;color:var(--muted);margin:.2rem 0}
.emp-manage-actions{display:flex;gap:.4rem}
.emp-stat-badge{display:inline-block;padding:.15rem .5rem;border-radius:50px;font-size:.7rem;font-weight:600}
.emp-stat-badge.active{background:#D4EDDA;color:var(--a3)}
.emp-stat-badge.inactive{background:#F8F8F8;color:#888}

/* Admin 全域視圖篩選 */
.admin-overview-filter{display:flex;gap:.5rem;margin-bottom:1rem}
.overview-filter-btn{padding:.45rem .9rem;border:1.5px solid var(--bd);border-radius:50px;font-size:.82rem;cursor:pointer;background:white;font-family:inherit;transition:var(--tr)}
.overview-filter-btn:hover{border-color:var(--a);color:var(--a)}
.overview-filter-btn.active{background:var(--a);color:white;border-color:var(--a)}

</head>

    // UI filters
    if (shopF && (!o.pickupShop || o.pickupShop.indexOf(shopF) === -1)) return false;
    if (statusF && o.status !== statusF) return false;
    if (dateF) {
      var d = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt);
      var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (ds !== dateF) return false;
    }
    return true;
  });

  // Stats
  var today = new Date().toISOString().slice(0,10);
  var todayOrders = allOrders.filter(function(o){
    var d = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt);
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return ds === today;
  });
  var totalAmt = todayOrders.reduce(function(s,o){ return s + (o.finalTotal||o.total||0); }, 0);

    '<div class="stat-card"><div class="stat-label">�Ѵ_�J</div><div class="stat-value green">'+paidCnt+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">���ս��~</div><div class="stat-value">HK$'+totalAmt+'</div></div>';

  if (filtered.length === 0) {
    body.innerHTML = '<tr><td colspan="9"><div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-4-4 1.4-1.4 2.6 2.6 6.6-6.6L17 11z"/></svg>���oӆ��</div></td></tr>';

    var d = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt);
    var timeStr = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var items = (o.items||[]).map(function(i){ return (i.name||'')+(i.variant?' ('+i.variant+')':''); }).join(', ');
    var isPending = o.status === 'pending';
    var canConfirm = (currentUser.role==='admin') ||
      (currentUser.role==='central' && o.pickupShop && o.pickupShop.indexOf('��')>=0) ||
      (currentUser.role==='pioneer' && o.pickupShop && o.pickupShop.indexOf('��')>=0);

      '<td class="order-id">#'+(o.orderId||o._id)+'</td>'+
      '<td style="font-size:.78rem;color:var(--muted)">'+timeStr+'</td>'+
      '<td>'+(o.customerName||'-')+'</td>'+
      '<td style="font-size:.78rem">'+(o.customerPhone||'-')+'</td>'+
      '<td style="font-size:.78rem">'+(o.pickupShop||'-')+'</td>'+
      '<td style="font-weight:700;color:var(--a)">HK$'+(o.finalTotal||o.total||0)+'</td>'+
      '<td><span class="order-status '+(o.status||'pending')+'">'+statusLabel[o.status]||'δ֪'+'</span></td>'+
      '<td style="max-width:180px"><div class="order-items" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+items+'">'+items+'</div></td>'+
      '<td>'+
        (isPending && canConfirm ?
          '<button class="confirm-btn" onclick="confirmPayment(\''+o._id+'\')">�_�J�տ�</button>' :

  });
  body.innerHTML = html;

var allEmployees = [];
var allClockins = [];
var selectedClockEmp = null;

function onClockStoreChange() {
    var store = document.getElementById('clockStoreSelect').value;
    var section = document.getElementById('clockSection');
    if (!store) { section.style.display = 'none'; return; }
    section.style.display = '';
    document.getElementById('empListClock').innerHTML = '<span style="font-size:.85rem;color:var(--muted)">載入中...</span>';
    document.getElementById('clockBtn').disabled = true;
    document.getElementById('clockBtn').className = 'clock-btn clock-in';
    document.getElementById('clockBtn').textContent = '返工';
    document.getElementById('clockStatus').style.display = 'none';
    document.getElementById('clockPin').value = '';
    Promise.all([
        db.collection('employees').where('active','==',true).get(),
        db.collection('checkins').where('date','==',getTodayStr()).get()
    ]).then(function(results) {
        allEmployees = []; results[0].forEach(function(d){ var e=d.data();e._id=d.id;allEmployees.push(e); });
        allClockins = []; results[1].forEach(function(d){ var c2=d.data();c2._id=d.id;allClockins.push(c2); });
        renderEmpButtons(store);
        renderTodayRecords(store);
        if(currentUser && currentUser.role==='admin'){
            document.getElementById('clockRecordsAdmin').style.display='';
            renderClockRecords();
        }
    }).catch(function(e){ document.getElementById('empListClock').innerHTML='<span style="color:var(--a)">載入失敗:'+e.message+'</span>'; });
}

function renderEmpButtons(store) {
    var div = document.getElementById('empListClock');
    if(allEmployees.length===0){ div.innerHTML='<span style="font-size:.85rem;color:var(--muted)">請先用 admin 新增員工</span>'; return; }
    var html='';
    allEmployees.forEach(function(emp){
        var todayCI=allClockins.filter(function(c2){return c2.employeeId===emp._id && c2.store===store;});
        var hasCI=todayCI.length>0;
        var hasCO=todayCI.some(function(c2){return c2.clockOut!=null;});
        var cls='emp-btn'+(hasCI?' clocked':'');
        html+='<button class="'+cls+'" onclick="selectEmp(\''+emp._id+'\',\''+store+'\')">'+escHtml(emp.name)+'</button>';
    });
    div.innerHTML=html;
}

function renderTodayRecords(store) {
    var div=document.getElementById('clockTodayRecords');
    var recs=allClockins.filter(function(c2){return c2.store===store;});
    if(recs.length===0){ div.innerHTML='<span style="font-size:.85rem;color:var(--muted)">今日尚無記錄</span>'; return; }
    var html='<table class="clock-table" style="width:100%"><thead><tr><th>員工</th><th>返工</th><th>收工</th><th>時數</th></tr></thead><tbody>';
    recs.forEach(function(c2){
        var ci=c2.clockIn?new Date(c2.clockIn).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}):'-';
        var co=c2.clockOut?new Date(c2.clockOut).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}):'<span style="color:var(--a);font-weight:600">工作中</span>';
        var dur=calcDuration(c2);
        html+='<tr><td class="clock-emp">'+escHtml(c2.employeeName)+'</td><td class="clock-time">'+ci+'</td><td>'+co+'</td><td class="clock-dur">'+(dur?dur+'h':'<span style="color:var(--muted)">-</span>')+'</td></tr>';
    });
    html+='</tbody></table>';
    div.innerHTML=html;
}

function selectEmp(empId, store) {
    selectedClockEmp=empId;
    var emp=allEmployees.find(function(e){return e._id===empId;});
    if(!emp)return;
    document.querySelectorAll('#empListClock .emp-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('#empListClock .emp-btn').forEach(function(b){if(b.textContent.indexOf(emp.name)>=0||b.getAttribute('onclick').indexOf(empId)>=0)b.classList.add('active');});
    document.getElementById('clockPin').value='';
    document.getElementById('clockPin').focus();
    var todayCI=allClockins.filter(function(c2){return c2.employeeId===empId&&c2.store===store;});
    var hasCI=todayCI.length>0;
    var hasCO=todayCI.some(function(c2){return c2.clockOut!=null;});
    var btn=document.getElementById('clockBtn');
    var st=document.getElementById('clockStatus');
    if(!hasCO){
        btn.className=hasCI?'clock-btn clock-out':'clock-btn clock-in';
        btn.textContent=hasCI?'收工':'返工';
        btn.disabled=false;
        st.style.display='none';
    } else {
        btn.className='clock-btn clock-in';
        btn.textContent='已完成（明日再打）';
        btn.disabled=true;
        st.style.display='';
        st.className='clock-status on';
        st.innerHTML='<strong>'+escHtml(emp.name)+'</strong> 今日已完成工作';
    }
}

function doClock() {
    var store=document.getElementById('clockStoreSelect').value;
    var pin=document.getElementById('clockPin').value.trim();
    var btn=document.getElementById('clockBtn');
    var st=document.getElementById('clockStatus');
    if(!selectedClockEmp||!pin){alert('請選擇員工並輸入 PIN');return;}
    var emp=allEmployees.find(function(e){return e._id===selectedClockEmp;});
    if(!emp)return;
    if(emp.pin!==pin){
        st.style.display='';
        st.className='clock-status off';
        st.innerHTML='PIN 錯誤';
        return;
    }
    var todayCI=allClockins.filter(function(c2){return c2.employeeId===emp._id&&c2.store===store;});
    var hasCI=todayCI.length>0;
    var hasCO=todayCI.some(function(c2){return c2.clockOut!=null;});
    btn.disabled=true; btn.textContent='處理中...';
    if(!hasCI){
        db.collection('checkins').add({
            employeeId:emp._id, employeeName:emp.name, store:store,
            date:getTodayStr(), clockIn:firebase.firestore.FieldValue.serverTimestamp(),
            clockOut:null, createdBy:currentUser?currentUser.uid:null
        }).then(function(){onClockStoreChange();}).catch(function(e){btn.disabled=false;btn.textContent='返工';alert('失敗:'+e.message);});
    } else if(!hasCO){
        var rec=todayCI.find(function(c2){return c2.clockOut==null;});
        if(!rec)return;
        db.collection('checkins').doc(rec._id).update({
            clockOut:firebase.firestore.FieldValue.serverTimestamp()
        }).then(function(){onClockStoreChange();}).catch(function(e){btn.disabled=false;btn.textContent='收工';alert('失敗:'+e.message);});
    }
}

function renderClockRecords() {
    if(!currentUser||currentUser.role!=='admin')return;
    var storeF=document.getElementById('clockRecordStoreFilter').value;
    var dateF=document.getElementById('clockRecordDateFilter').value;
    var body=document.getElementById('clockRecordsBody');
    var filtered=allClockins.filter(function(c2){
        if(storeF&&c2.store!==storeF)return false;
        if(dateF&&c2.date!==dateF)return false;
        return true;
    });
    if(filtered.length===0){body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">暫無記錄</td></tr>';return;}
    var storeName={pioneer:'旺角',central:'中環'};
    var html='';
    filtered.forEach(function(c2){
        var ci=c2.clockIn?new Date(c2.clockIn).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}):'-';
        var co=c2.clockOut?new Date(c2.clockOut).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}):'<span style="color:var(--a)">工作中</span>';
        var dur=calcDuration(c2);
        var status=c2.clockOut?'完成':'<span style="color:var(--a)">工作中</span>';
        html+='<tr><td class="clock-emp">'+escHtml(c2.employeeName)+'</td><td class="clock-store">'+storeName[c2.store]+'</td><td class="clock-time">'+ci+'</td><td>'+co+'</td><td class="clock-dur">'+(dur?dur+'h':'<span style="color:var(--muted)">-</span>')+'</td><td>'+status+'</td></tr>';
    });
    body.innerHTML=html;
}

function calcDuration(c2) {
    if(!c2.clockIn||!c2.clockOut)return null;
    var ms=new Date(c2.clockOut).getTime()-new Date(c2.clockIn).getTime();
    if(ms<=0)return null;
    return(ms/3600000).toFixed(1);
}

function getTodayStr() {
    var d=new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Employee management (admin)
function loadEmployees() {
    if(!currentUser||currentUser.role!=='admin')return;
    var div=document.getElementById('empListManage');
    if(!div)return;
    div.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">載入中...</div>';
    db.collection('employees').orderBy('name').get().then(function(snap){
        if(snap.empty){div.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">尚無員工，點擊右上角新增</div>';return;}
        var html='';
        snap.forEach(function(d){var emp=d.data();emp._id=d.id;html+=renderEmpCard(emp);});
        div.innerHTML=html;
    }).catch(function(e){div.innerHTML='<div style="color:var(--a)">載入失敗:'+e.message+'</div>';});
}

function renderEmpCard(emp) {
    return '<div class="emp-manage-card">'+
        '<div class="emp-manage-header">'+
          '<div><div class="emp-manage-name">'+escHtml(emp.name)+'</div>'+
               '<div class="emp-manage-info">PIN: '+String(emp.pin||'').replace(/./g,'*')+'</div>'+
          '</div>'+
          '<div class="emp-manage-actions">'+
            '<span class="emp-stat-badge '+(emp.active!==false?'active':'inactive')+'">'+(emp.active!==false?'在職':'停用')+'</span>'+
            '<button class="acct-btn" onclick="openEditEmp(\''+emp._id+'\')">編輯</button>'+
            '<button class="acct-btn danger" onclick="toggleEmp(\''+emp._id+'\','+String(emp.active!==false)+')">'+(emp.active!==false?'停用':'啟用')+'</button>'+
          '</div>'+
        '</div></div>';
}

function openAddEmp() {
    var name=prompt('員工姓名:');
    if(!name||!name.trim())return;
    var pin=prompt('PIN (4-6位數字):');
    if(!pin||!/^\d{4,6}$/.test(pin)){alert('PIN需為4-6位數字');return;}
    db.collection('employees').add({
        name:name.trim(), pin:pin, active:true,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        createdBy:currentUser?currentUser.uid:null
    }).then(function(){loadEmployees();}).catch(function(e){alert('新增失敗:'+e.message);});
}

function openEditEmp(empId) {
    var newName=prompt('新員工姓名:');
    if(!newName||!newName.trim())return;
    var newPin=prompt('新PIN (留空不改):');
    var updates={name:newName.trim()};
    if(newPin&&/^\d{4,6}$/.test(newPin))updates.pin=newPin;
    db.collection('employees').doc(empId).update(updates).then(function(){loadEmployees();}).catch(function(e){alert('更新失敗:'+e.message);});
}

function toggleEmp(empId, currentlyActive) {
    if(!confirm(currentlyActive?'停用此員工？':'啟用此員工？'))return;
    db.collection('employees').doc(empId).update({active:!currentlyActive}).then(function(){loadEmployees();}).catch(function(e){alert('操作失敗:'+e.message);});
}

// ====== END CLOCK SYSTEM ======
