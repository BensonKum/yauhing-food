<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祐興倉存管理 | Yau Hing Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--bg2:#F0EAE0;--txt:#2D2D2D;--muted:#6B6B6B;--red:#C8462B;--orange:#E07B3A;--green:#2D6A4F;--gold:#D4A843;--bd:#E0D8C8;--sh1:0 2px 8px rgba(0,0,0,.06);--sh2:0 8px 24px rgba(0,0,0,.10);--r:14px;--tr:all .3s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7}

/* --- Top Bar --- */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(250,250,248,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);padding:.5rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.topbar-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;color:var(--txt);white-space:nowrap;cursor:pointer}
.topbar-title small{display:block;font-family:'Noto Sans TC',sans-serif;font-size:.65rem;font-weight:400;color:var(--muted)}

.tab-bar{display:flex;gap:4px;background:var(--bg2);border-radius:50px;padding:3px}
.tab-btn{
  padding:.3rem 1rem;border:none;border-radius:50px;font-size:.78rem;font-weight:500;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);background:transparent;
}
.tab-btn.active{background:white;color:var(--txt);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}

.mode-toggle{display:flex;background:var(--bg2);border-radius:50px;padding:3px;gap:3px}
.mode-btn{
  padding:.35rem 1.1rem;border:none;border-radius:50px;font-size:.8rem;font-weight:500;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);background:transparent;
}
.mode-btn.active{background:var(--red);color:white}
.mode-btn.active-purchase{background:var(--green);color:white}
.mode-btn.active-purchase{background:var(--green);color:white}

.store-badge{
  padding:.35rem .9rem;border-radius:50px;font-size:.78rem;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;border:1.5px solid var(--bd);cursor:pointer;transition:var(--tr);white-space:nowrap;
}
.store-badge.central{background:#FFF3E0;color:#E65100;border-color:#FFB74D}
.store-badge.pioneer{background:#F3E5F5;color:#6A1B9A;border-color:#CE93D8}

.topbar-right{display:flex;align-items:center;gap:.6rem}
.user-info{font-size:.75rem;color:var(--muted)}

/* --- Main Layout --- */
.main-wrap{
  margin-top:68px;display:flex;height:calc(100vh - 68px);
}
.pcat-bar{
  width:170px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);
  padding:1rem .5rem;overflow-y:auto;
}
.pcat-btn{
  display:block;width:100%;padding:.55rem .8rem;text-align:left;
  border:none;background:transparent;border-radius:var(--r);font-size:.85rem;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);margin-bottom:2px;
}
.pcat-btn:hover{background:var(--bd);color:var(--txt)}
.pcat-btn.active{background:var(--red);color:white;font-weight:600}
.btn-logout{padding:.3rem .7rem;border:1px solid var(--bd);background:transparent;border-radius:6px;font-size:.72rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:var(--tr);margin-right:.4rem}
.btn-logout:hover{background:var(--red);color:white;border-color:var(--red)}

/* --- Product Grid --- */
.pgrid-area{flex:1;overflow-y:auto;padding:1.2rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;padding-bottom:180px}

.pcard{
  background:white;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--bd);transition:var(--tr);
  box-shadow:var(--sh1);display:flex;flex-direction:column;
}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.pcard-img{
  width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
}
.pcard-img.has-img{background:#f5f0ea}
.pcard-body{padding:.7rem;flex:1;display:flex;flex-direction:column}
.pcard-name{font-family:'Noto Serif TC',serif;font-size:.88rem;font-weight:600;line-height:1.3;margin-bottom:.3rem;color:var(--txt)}
.pcard-price{font-size:.82rem;color:var(--red);font-weight:600;margin-bottom:.2rem}
.pcard-stock{font-size:.72rem;color:var(--muted);margin-bottom:.5rem}
.pcard-stock.low{color:#E65100;font-weight:600}
.pcard-stock.zero{color:#B71C1C;font-weight:600}

/* qty controls */
.qty-ctrl{
  display:flex;align-items:center;gap:.4rem;margin-top:auto;
  background:var(--bg2);border-radius:50px;padding:4px;
}
.qty-btn{
  width:30px;height:30px;border:none;border-radius:50%;background:var(--red);color:white;
  font-size:1.1rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;
}
.qty-btn:hover{background:#a83820;transform:scale(1.1)}
.qty-btn.green{background:var(--green)}
.qty-btn.green:hover{background:#1b4332}
.qty-num{
  flex:1;text-align:center;font-size:.92rem;font-weight:700;
  color:var(--txt);min-width:24px;
}

/* --- Cart Panel --- */
.cart-panel{
  width:340px;flex-shrink:0;background:white;border-left:1px solid var(--bd);
  display:flex;flex-direction:column;
}
.cart-head{
  padding:.8rem 1rem;border-bottom:1px solid var(--bd);
  background:var(--bg2);
}
.cart-head-title{
  font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;
}
.cart-head-sub{font-size:.72rem;color:var(--muted);margin-top:1px}

.cart-items{flex:1;overflow-y:auto;padding:.6rem}
.cart-item{
  display:flex;align-items:center;gap:.6rem;padding:.5rem;
  border-radius:8px;margin-bottom:.4rem;background:var(--bg);
  transition:var(--tr);
}
.cart-item:hover{background:var(--bg2)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:.72rem;color:var(--muted)}
.ci-qty{font-size:.78rem;color:var(--red);font-weight:600;white-space:nowrap}
.ci-total{font-size:.85rem;font-weight:700;color:var(--txt);white-space:nowrap;text-align:right;min-width:50px}
.ci-remove{
  background:none;border:none;font-size:.9rem;cursor:pointer;color:var(--muted);
  padding:2px 4px;border-radius:4px;transition:var(--tr);flex-shrink:0;
}
.ci-remove:hover{color:var(--red);background:#FFEBEE}

.cart-empty{
  text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.85rem
}
.cart-empty-icon{font-size:3rem;margin-bottom:.6rem;opacity:.3}

.cart-foot{padding:1rem;border-top:1px solid var(--bd);background:var(--bg2)}
.cart-summary{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;
}
.cart-summary-label{font-size:.82rem;color:var(--muted)}
.cart-summary-val{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:700;color:var(--red)}
.cart-total-items{font-size:.72rem;color:var(--muted);margin-bottom:.8rem}
.cart-total-items span{font-weight:600;color:var(--txt)}

.cart-actions{display:flex;flex-direction:column;gap:.5rem}
.btn-confirm{
  width:100%;padding:.8rem;border:none;border-radius:50px;
  font-size:.9rem;font-weight:600;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-confirm-sale{background:var(--red);color:white}
.btn-confirm-sale:hover{background:#a83820;transform:scale(1.02)}
.btn-confirm-purchase{background:var(--green);color:white}
.btn-confirm-purchase:hover{background:#1b4332;transform:scale(1.02)}
.btn-clear{background:transparent;border:1.5px solid var(--bd);color:var(--muted);border-radius:50px;padding:.45rem;font-size:.78rem;cursor:pointer;transition:var(--tr)}
.btn-clear:hover{border-color:var(--red);color:var(--red)}

/* receipt */
.receipt-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.receipt-modal.show{opacity:1;pointer-events:all}
.receipt-box{
  background:white;border-radius:16px;max-width:360px;width:100%;
  max-height:90vh;overflow-y:auto;padding:1.5rem;box-shadow:var(--sh3);
}
.receipt-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:.2rem}
.receipt-sub{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:1rem}
.receipt-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px dashed var(--bd);font-size:.85rem}
.receipt-row:last-child{border:none}
.receipt-total{background:var(--bg2);border-radius:8px;padding:.6rem .8rem;margin-top:.6rem;display:flex;justify-content:space-between;align-items:center}
.receipt-total-label{font-weight:700}
.receipt-total-amt{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;color:var(--red)}
.receipt-actions{margin-top:1rem;display:flex;flex-direction:column;gap:.5rem}
.btn-receipt-ok{
  width:100%;padding:.7rem;border:none;border-radius:50px;
  background:var(--green);color:white;font-size:.9rem;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;
}
.btn-receipt-close{width:100%;padding:.5rem;border:1.5px solid var(--bd);border-radius:50px;background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem}

/* confirm dialog */
.confirm-dialog{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.confirm-dialog.show{opacity:1;pointer-events:all}
.confirm-box{background:white;border-radius:16px;padding:1.5rem;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
.confirm-msg{font-size:.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.5}
.confirm-btns{display:flex;gap:.6rem}
.confirm-yes{flex:1;padding:.6rem;border:none;border-radius:50px;background:var(--red);color:white;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.confirm-no{flex:1;padding:.6rem;border:1.5px solid var(--bd);border-radius:50px;background:transparent;color:var(--muted);cursor:pointer}

/* toast */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);
  background:#2D2D2D;color:white;padding:.6rem 1.2rem;border-radius:50px;
  font-size:.82rem;z-index:3000;transition:transform .4s cubic-bezier(.4,0,.2,1);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* auth */
.auth-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:5000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.auth-box{background:white;border-radius:16px;padding:2rem;max-width:360px;width:100%;box-shadow:var(--sh2)}
.auth-title{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.auth-sub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.auth-field{margin-bottom:.8rem}
.auth-label{font-size:.78rem;font-weight:600;margin-bottom:.3rem;display:block;color:var(--muted)}
.auth-input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.88rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:var(--tr)}
.auth-input:focus{border-color:var(--red)}
.auth-btn{width:100%;padding:.75rem;border:none;border-radius:50px;background:var(--red);color:white;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:.6rem}
.auth-error{font-size:.75rem;color:var(--red);margin-top:.4rem;text-align:center;min-height:1em}

/* PIN Login */
.pin-login-divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0 .8rem;color:var(--muted)}
.pin-login-divider::before,.pin-login-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.pin-login-label{font-size:.75rem;white-space:nowrap;font-weight:500}
.pin-inputs{display:flex;justify-content:center;gap:.5rem;margin-bottom:.6rem}
.pin-digit{width:48px;height:54px;border:2px solid var(--bd);border-radius:10px;font-size:1.4rem;font-weight:700;text-align:center;outline:none;transition:var(--tr);font-family:'Courier New',monospace;background:#FAFAFA}
.pin-digit:focus{border-color:var(--green);background:white;box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.pin-hint{font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:.8rem}
.pin-btn{width:100%;padding:.65rem;border:none;border-radius:50px;background:var(--green);color:white;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:var(--tr)}
.pin-btn:hover{background:#236B3F}
.pin-btn:disabled{background:#ccc;cursor:not-allowed}
.pin-lock-msg{font-size:.72rem;color:var(--red);text-align:center;margin-top:.4rem;display:none}

/* Phone field in employee form */
.emp-phone-field{margin-top:.3rem}

@media(max-width:768px){
  .topbar{flex-direction:column;align-items:stretch;height:auto;padding:.4rem .6rem;gap:.35rem}
  .topbar-title{font-size:.9rem;margin-bottom:.2rem}
  .topbar-title small{font-size:.7rem}
  .topbar-right{order:-1;position:absolute;top:.4rem;right:.6rem}
  .tab-bar,.mode-toggle{width:100%;justify-content:center}
  .tab-btn,.mode-btn{padding:.35rem .8rem;font-size:.75rem}
  .main-wrap{margin-top:130px;display:flex;flex-direction:column;height:calc(100vh - 130px)}
  .pcat-bar{display:flex;flex-direction:row;width:100%;height:auto;max-height:50px;overflow-x:auto;overflow-y:hidden;padding:.5rem;border-right:none;border-bottom:1px solid var(--bd);gap:4px;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0}
  .pcat-bar::-webkit-scrollbar{display:none}
  .pcat-btn{display:inline-block;width:auto;white-space:nowrap;padding:.35rem .6rem;font-size:.75rem;margin-bottom:0;flex-shrink:0;border-radius:16px;background:var(--bg1);border:1px solid var(--bd)}
  .pcat-btn.active{background:var(--red);color:white;border-color:var(--red)}
  .pgrid-area{flex:1;overflow-y:auto;min-height:0;height:100%;box-sizing:border-box}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));padding-bottom:0}
  .cart-panel{position:fixed;right:0;top:68px;bottom:0;width:100%;transform:translateX(100%);transition:transform .3s;z-index:900}
  .cart-panel.open{transform:translateX(0)}
  .cart-btn-mobile{display:flex !important}
}
.cart-btn-mobile{
  display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:800;
  background:var(--red);color:white;border:none;border-radius:50%;width:56px;height:56px;
  font-size:1.5rem;box-shadow:var(--sh2);cursor:pointer;
  align-items:center;justify-content:center;
}

/* Locked store filter for non-admin/SM */
.locked-filter{opacity:.6;cursor:not-allowed;pointer-events:none;background:var(--bg2) !important;border-color:var(--bd) !important}

.tab-content{display:none}
.tab-content.active{display:block}

/* Edit Modal */
.edit-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:1rem}
.edit-modal-content{background:white;border-radius:16px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--sh2)}
.edit-modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid var(--bd)}
.edit-modal-header h3{font-size:1.1rem;margin:0}
.edit-modal-close{border:none;background:transparent;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.edit-modal-close:hover{color:var(--txt)}
.edit-modal-body{padding:1.2rem}
.edit-info{display:flex;gap:.8rem;margin-bottom:1rem;font-size:.85rem;color:var(--muted)}
.edit-type{padding:.2rem .6rem;border-radius:4px;font-weight:600}
.edit-type.sale{background:#FFEBEE;color:#C62828}
.edit-type.purchase{background:#E8F5E9;color:#2E7D32}
.edit-item-row{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--bd)}
.edit-item-name{flex:1;font-size:.9rem}
.edit-item-qty{width:60px;padding:.3rem .5rem;border:1px solid var(--bd);border-radius:6px;text-align:center;font-size:.9rem}
.edit-item-unit{font-size:.8rem;color:var(--muted)}
.edit-total{margin-top:1rem;padding-top:1rem;border-top:2px solid var(--bd);font-size:1.1rem;font-weight:600;text-align:right}
.edit-modal-footer{display:flex;gap:.5rem;padding:1rem 1.2rem;border-top:1px solid var(--bd)}
.btn-cancel,.btn-save{flex:1;padding:.6rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-cancel{background:var(--bg2);color:var(--txt)}
.btn-cancel:hover{background:var(--bd)}
.btn-save{background:var(--green);color:white}
.btn-save:hover{background:#236B3F}

/* Employee Management */
.btn-add-emp{padding:.5rem 1.2rem;background:var(--green);color:white;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-add-emp:hover{background:#236B3F}
.emp-list{display:flex;flex-direction:column;gap:.5rem}
.emp-card{background:white;border-radius:12px;padding:1rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh1);border:1px solid var(--bd)}
.emp-info{flex:1}
.emp-name{font-weight:600;font-size:.95rem;margin-bottom:.2rem}
.emp-email{font-size:.8rem;color:var(--muted)}
.emp-role{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.75rem;font-weight:600;margin-left:.5rem}
.emp-role.admin{background:#FFEBEE;color:#C62828}
.emp-role.central{background:#FFF3E0;color:#E65100}
.emp-role.pioneer{background:#F3E5F5;color:#6A1B9A}
.emp-role.sm{background:#E3F2FD;color:#1565C0}
.emp-actions{display:flex;gap:.3rem}
.btn-emp-edit,.btn-emp-del{border:none;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1rem;transition:var(--tr)}
.btn-emp-edit{background:#E3F2FD;color:#1565C0}
.btn-emp-edit:hover{background:#BBDEFB}
.btn-emp-del{background:#FFEBEE;color:#C62828}
.btn-emp-del:hover{background:#FFCDD2}

/* Add Employee Modal */
.add-emp-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:1rem}
.add-emp-content{background:white;border-radius:16px;max-width:400px;width:100%;padding:1.5rem;box-shadow:var(--sh2)}
.add-emp-content h3{margin:0 0 1rem;font-size:1.1rem}
.add-emp-form{display:flex;flex-direction:column;gap:.8rem}
.add-emp-form label{font-size:.85rem;font-weight:500;margin-bottom:.2rem}
.add-emp-form input,.add-emp-form select{padding:.6rem;border:1px solid var(--bd);border-radius:8px;font-size:.9rem;font-family:'Noto Sans TC',sans-serif}
.add-emp-form input:focus,.add-emp-form select:focus{outline:none;border-color:var(--green)}
.add-emp-btns{display:flex;gap:.5rem;margin-top:.5rem}
.btn-emp-cancel,.btn-emp-save{flex:1;padding:.6rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-emp-cancel{background:var(--bg2);color:var(--txt)}
.btn-emp-save{background:var(--green);color:white}
.btn-emp-save:hover{background:#236B3F}

/* Employee Management */
.emp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:0 .5rem}
.emp-header h3{margin:0;font-size:1.1rem}
.emp-list{display:flex;flex-direction:column;gap:.5rem}
.emp-card{background:white;border-radius:12px;padding:1rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--bd)}
.emp-info{flex:1}

<script>
// --- Firebase Config ---
const fb = firebase.initializeApp({
  apiKey: "AIzaSyAeRezKIwd93M1CHc-JtKFKIYtGAW9mVFk",
  authDomain: "yauhing-food.firebaseapp.com",
  projectId: "yauhing-food"
});
const db = firebase.firestore();
const auth = firebase.auth();

// --- State ---
let products = [];
// --- Discontinued Products (停售) ---
const discontinuedSkus = ['YH017']; // Add SKUs here to mark as 停售
let cart = {};       // {cartKey: {qty, price, cat, pack}}
let selectedPack = {}; // {productName: selectedPackLabel}
let currentMode = 'sale';
let currentStore = null;  // 'central' | 'pioneer'
let currentUser = null;
let isAdminUser = false;  // Global admin flag
let isSMUser = false;    // Global SM (Store Manager) flag
let userStore = null;    // Employee's assigned home store (central/pioneer)
let currentCat = '全部';

// --- PIN Login State ---
let pinFailCount = 0;
let pinLockedUntil = 0;

// --- Load Products from products.json ---
fetch('products.json').then(r=>r.json()).then(data=>{
  products = data;
  renderCatBar();
  renderGrid();
}).catch(e=>console.error('products.json load failed:',e));

// --- Auth ---
auth.onAuthStateChanged(user=>{
  if(user){ currentUser=user; showApp(); }
  else {
    currentUser=null;
    document.getElementById('authOverlay').style.display='flex';
    document.getElementById('userInfo').textContent='';
  }
});

// --- PIN Login Functions ---
function showPinLogin(){
  document.getElementById('emailLoginForm').style.display='none';
  document.getElementById('pinLoginForm').style.display='block';
  // Check if locked
  checkPinLock();
  // Setup PIN input (only bind listeners ONCE)
  const digits = document.querySelectorAll('.pin-digit');
  digits.forEach((d, i) => {
    d.value = '';
    if(!d.dataset.pinBound){
      d.dataset.pinBound = '1';
      d.addEventListener('keydown', function(e){
        if(e.key >= '0' && e.key <= '9'){
          e.preventDefault(); // prevent default to avoid double-input on some browsers
          this.value = e.key;
          if(i < 3) digits[i+1].focus();
          else {
            this.blur();
            // Auto-submit when 4th digit entered
            setTimeout(()=>pinLogin(), 150);
          }
        } else if(e.key === 'Backspace'){
          this.value = '';
          if(i > 0) digits[i-1].focus();
        } else if(e.key === 'Enter'){
          pinLogin();
        }
      });
    }
  });
  digits[0].focus();
}

function showEmailLogin(){
  document.getElementById('pinLoginForm').style.display='none';
  document.getElementById('emailLoginForm').style.display='block';
}

function checkPinLock(){
  const lockMsg = document.getElementById('pinLockMsg');
  const btn = document.getElementById('pinLoginBtn');
  if(pinLockedUntil > Date.now()){
    const remain = Math.ceil((pinLockedUntil - Date.now()) / 1000);
    lockMsg.textContent = 'PIN 已鎖定，請等待 ' + remain + ' 秒';
    lockMsg.style.display = 'block';
    btn.disabled = true;
    // Clear existing digits
    document.querySelectorAll('.pin-digit').forEach(d=>{d.value='';d.disabled=true;});
    // Countdown timer
    clearInterval(window._pinTimer);
    window._pinTimer = setInterval(()=>{
      if(pinLockedUntil <= Date.now()){
        clearInterval(window._pinTimer);
        lockMsg.style.display='none';
        btn.disabled = false;
        document.querySelectorAll('.pin-digit').forEach(d=>d.disabled=false);
        document.querySelector('.pin-digit').focus();
      } else {
        const r = Math.ceil((pinLockedUntil - Date.now()) / 1000);
        lockMsg.textContent = 'PIN 已鎖定，請等待 ' + r + ' 秒';
      }
    }, 1000);
  } else {
    lockMsg.style.display='none';
    btn.disabled = false;
    document.querySelectorAll('.pin-digit').forEach(d=>d.disabled=false);
  }
}

async function pinLogin(){
  const digits = document.querySelectorAll('.pin-digit');
  let pin = '';
  digits.forEach(d => { pin += d.value; });
  
  if(pin.length !== 4){
    document.getElementById('authError').textContent = '請輸入完整 4 位 PIN';
    return;
  }
  
  // Check lock
  if(pinLockedUntil > Date.now()){ checkPinLock(); return; }
  
  document.getElementById('authError').textContent = '';
  const btn = document.getElementById('pinLoginBtn');
  btn.textContent = '驗證中...';
  btn.disabled = true;
  
  try {
    // Query Firestore for matching PIN
    const snap = await db.collection('employees').where('pin', '==', pin).get();
    
    if(snap.empty){
      handlePinFail('PIN 不正確');
      return;
    }
    
    if(snap.size > 1){
      // Multiple matches — rare case, show names to pick
      btn.textContent = '確認登入';
      btn.disabled = false;
      document.getElementById('authError').textContent = '發現多個帳號，請用電郵登入';
      // Reset PIN inputs
      digits.forEach(d=>d.value='');
      digits[0].focus();
      return;
    }
    
    // Exactly 1 match — login successful
    const empData = snap.docs[0].data();
    const empId = snap.docs[0].id;
    
    // Set user state (mock user object for PIN login)
    currentUser = {
      email: empData.email || ('pin@' + empId),
      isPinLogin: true,
      uid: 'pin_' + empId
    };
    
    // Determine role/store from employee record
    const role = empData.role || '';
    const empStore = empData.store || '';  // Prefer explicit store field
    isAdminUser = (role === 'admin' || role === 'sm');
    isSMUser = (role === 'sm');

    // Store priority: explicit store field > infer from role > null
    if(empStore){
      userStore = empStore;
    } else if(role === 'pioneer'){
      userStore = 'pioneer';
    } else if(role === 'central'){
      userStore = 'central';
    } else {
      userStore = null;  // Unknown — will try email fallback or show dialog
    }
    
    // Reset fail count on success
    pinFailCount = 0;
    
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('userInfo').textContent = (empData.name || '員工') + ' (PIN)';
    
    // Navigate based on role
    if(isAdminUser || isSMUser){
      showEmployeeTab();
      showStoreSelect();
    } else if(userStore){
      selectStore(userStore);
    } else {
      // No store info in Firestore — show store selection dialog
      console.warn('PIN login: no store/role set for', empData.name, '(id:', empId, ') — showing store selector');
      showStoreSelect();
    }
    
    btn.textContent = '確認登入';
    btn.disabled = false;
    
  } catch(err){
    console.error('PIN login error:', err);
    handlePinFail('登入失敗，請重試');
  }
}

function handlePinFail(msg){
  pinFailCount++;
  const btn = document.getElementById('pinLoginBtn');
  btn.textContent = '確認登入';
  btn.disabled = false;
  document.getElementById('authError').textContent = msg;
  
  // Clear PIN inputs
  document.querySelectorAll('.pin-digit').forEach(d=>{d.value='';});
  document.querySelector('.pin-digit').focus();
  
  // Lock after 5 failed attempts
  if(pinFailCount >= 5){
    pinLockedUntil = Date.now() + (5 * 60 * 1000); // 5 minutes
    pinFailCount = 0;
    checkPinLock();
  }
}

function authLogin(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!email||!pass){document.getElementById('authError').textContent='請輸入電郵及密碼';return;}
  document.getElementById('authError').textContent='';
  auth.signInWithEmailAndPassword(email,pass)
    .then(()=>{document.getElementById('authOverlay').style.display='none';})
    .catch(e=>{
      if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'){
        document.getElementById('authError').textContent='電郵或密碼錯誤';
      } else {document.getElementById('authError').textContent=e.message;}
    });
}

async function showApp(){
  document.getElementById('authOverlay').style.display='none';
  document.getElementById('userInfo').textContent=currentUser.email;

// --- Store Select ---
async function showStoreSelect(){
  const email = currentUser ? currentUser.email.toLowerCase() : '';

  // Step 1: Admin & SM -> show dialog so they can pick any store
  if(email === 'admin@yauhing.hk'){
    isAdminUser = true;
    isSMUser = false;
    showEmployeeTab();
    document.getElementById('storeDialog').classList.add('show');
    return;
  }

  // Step 2: For other accounts, try Firestore employees collection
  try {
    const empSnap = await db.collection('employees').where('email','==',email).get();
    if(!empSnap.empty){
      const empData = empSnap.docs[0].data();
      if(empData.role === 'admin'){
        isAdminUser = true;
        isSMUser = false;
        showEmployeeTab();
        document.getElementById('storeDialog').classList.add('show');
        return;
      }
      if(empData.role === 'sm'){
        isAdminUser = true;   // SM has admin-level store access
        isSMUser = true;
        showEmployeeTab();
        document.getElementById('storeDialog').classList.add('show');
        return;
      }
      userStore = empData.role;
      if(userStore && (userStore === 'sm' || userStore === 'central' || userStore === 'pioneer')){
        isSMUser = true;
        showEmployeeTab();
      }
    }
  } catch(e){ console.error('employees query failed:', e); }

  // Step 3: Email pattern fallback
  if(!userStore){
    if(email.includes('central')) userStore = 'central';
    else if(email.includes('pioneer')) userStore = 'pioneer';
  }

  isAdminUser = false;
  isSMUser = false;
  if(userStore) {
    selectStore(userStore);
  } else {
    // Unknown store: show dialog but hide irrelevant buttons
    lockStoreDialogButtons(email);
    document.getElementById('storeDialog').classList.add('show');
  }
}

// --- Product Grid ---
function parseMultiPrice(priceStr){
  // priceStr like "HKD 25 (細樽裝) / HKD 40 (大樽裝)"
  const result={};
  if(!priceStr||!priceStr.includes('/')) return result;
  priceStr.split(' / ').forEach(seg=>{
    const m=seg.match(/HKD\s*([\d.]+)\s*\(([^)]+)\)/);
    if(m) result[m[2]]=parseFloat(m[1]);
  });
  return result;
}

function getPackOptions(p){
  if(!p.label1) return null;
  const multiPrices=parseMultiPrice(p.price);
  const opts=[];
  if(p.label1) opts.push({label:p.label1,img:p.img1,price:multiPrices[p.label1]||0});
  if(p.label2) opts.push({label:p.label2,img:p.img2,price:multiPrices[p.label2]||0});
  return opts.length>0?opts:null;
}

function getSelectedPack(p){
  const saved=selectedPack[p.name];
  const opts=getPackOptions(p);
  if(!opts) return null;
  return saved&&opts.find(o=>o.label===saved)?saved:opts[0].label;
}

function getPackPrice(p,packLabel){
  const opts=getPackOptions(p);
  if(!opts) return getPriceNum(p.price);
  const opt=opts.find(o=>o.label===packLabel);
  if(opt) return opt.price;
  return getPriceNum(p.price);
}

function getPackImg(p,packLabel){
  const opts=getPackOptions(p);
  if(!opts) return p.local_img||null; // single-pack: local_img already has correct filename
  // Multi-pack: use img1 or img2 filename from opts
  const opt=opts.find(o=>o.label===packLabel)||opts[0];
  return opt.img||p.local_img||null;
}

function renderGrid(){

    const packOpts=getPackOptions(p);
    const selPack=getSelectedPack(p);
    const cartKey=selPack?p.name+'|'+selPack:p.name;
    const inCart=cart[cartKey]||{qty:0,price:getPackPrice(p,selPack),cat:p.cat,pack:selPack};

    const card=document.createElement('div');

      img.style='width:100%;height:100%;object-fit:cover;';
      img.onerror=()=>{img.style.display='none';imgWrap.textContent='🍜';};
      imgWrap.appendChild(img);
      imgWrap.classList.add('has-img');
    } else {

    }

    name.className='pcard-name';
    name.textContent=p.name;

    // Stock
    const stockDiv=document.createElement('div');
    stockDiv.className='pccard-stock '+stockClass;
    stockDiv.textContent=typeof stock==='number'?`庫存：${stock} 件`:stock;

    // Pack selector (if multi-pack)
    if(packOpts&&packOpts.length>0){
      const packRow=document.createElement('div');
      packRow.style.cssText='display:flex;gap:.3rem;margin-bottom:.4rem;flex-wrap:wrap';
      packOpts.forEach(opt=>{

        btn.textContent=opt.label;
        btn.onclick=(e)=>{e.stopPropagation();selectedPack[p.name]=opt.label;renderGrid();};
        packRow.appendChild(btn);
      });
      body.appendChild(name);
      body.appendChild(packRow);
      body.appendChild(price);
      body.appendChild(stockDiv);
    } else {
      body.appendChild(name);

    }

    // Qty controls
    const qtyCtrl=document.createElement('div');

// --- Cart Logic ---
function changeQty(cartKey,delta,p,selPack){
  // Allow if store is selected OR if user is logged in as employee (store inferred from email)
  if(!currentStore){
    const email = currentUser ? currentUser.email.toLowerCase() : '';
    // Infer store from email pattern
    if(email.includes('central')){ currentStore = 'central'; selectStoreDisplay('central'); }
    else if(email.includes('pioneer')){ currentStore = 'pioneer'; selectStoreDisplay('pioneer'); }
    else {
      toast('請先選擇分店');
      showStoreSelect();
      return;
    }
  }
  if(!cart[cartKey]){
    cart[cartKey]={qty:0,price:getPackPrice(p,selPack),cat:p.cat,name:p.name,pack:selPack};
  }
  cart[cartKey].qty+=delta;
  if(cart[cartKey].qty<=0){delete cart[cartKey];}
  renderCart();
  renderGrid();
}

function renderCart(){
  const container=document.getElementById('cartItems');
  const keys=Object.keys(cart);
  if(keys.length===0){
    container.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div>尚未加入任何項目<br>從左邊選擇產品</div>`;
    document.getElementById('cartTotal').textContent='HK$0';
    document.getElementById('cartCount').innerHTML='共 <span>0</span> 款產品';
    return;
  }
  let total=0;let html='';let count=0;
  keys.forEach(cartKey=>{
    const item=cart[cartKey];
    const lineTotal=item.qty*item.price;
    total+=lineTotal;count+=item.qty;
    const displayName=item.pack?`${item.name}（${item.pack}）`:item.name;
    html+=`<div class="cart-item">
      <div class="ci-info"><div class="ci-name">${displayName}</div><div class="ci-price">HK$${item.price}/件</div></div>
      <div class="ci-qty">×${item.qty}</div>
      <div class="ci-total">HK$${lineTotal}</div>
      <button class="ci-remove" onclick="removeItem('${cartKey.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  });
  container.innerHTML=html;
  document.getElementById('cartTotal').textContent='HK$'+total;
  document.getElementById('cartCount').innerHTML=`共 <span>${count}</span> 件產品，<span>${keys.length}</span> 款`;
}

function removeItem(cartKey){delete cart[cartKey];renderCart();renderGrid();}
function clearCart(){cart={};renderCart();renderGrid();}

function getPriceNum(priceStr){
  const m=String(priceStr).match(/[\d.]+/);
  return m?parseFloat(m[0]):0;
}

// --- Confirm & Save ---
function confirmTransaction(){
  if(Object.keys(cart).length===0){toast('請先加入產品');return;}
  if(!currentStore){toast('請先選擇分店');showStoreSelect();return;}
  const items=Object.entries(cart).map(([name,d])=>
    `${name} × ${d.qty} = HK$${d.qty*d.price}`
  ).join('\n');
  const total=Object.values(cart).reduce((s,i)=>s+i.qty*i.price,0);
  document.getElementById('confirmTitle').textContent=
    currentMode==='sale'?'📤 確認銷售交易？':'📥 確認進貨記錄？';
  document.getElementById('confirmMsg').innerHTML=
    `<div style="text-align:left;font-size:.8rem;background:#f5f5f5;border-radius:8px;padding:.6rem;margin-bottom:.5rem">${items.replace(/\n/g,'<br>')}</div><strong>合計：HK$${total}</strong><br><span style="font-size:.72rem;color:var(--muted)">分店：${currentStore==='central'?'中環店':'始創店'}</span>`;
  document.getElementById('confirmDialog').classList.add('show');
}

function closeConfirm(){
  document.getElementById('confirmDialog').classList.remove('show');
}

async function doConfirm(){
  closeConfirm();
  const storeField=currentStore;
  const delta=currentMode==='sale'?-1:1;
  const total=Object.values(cart).reduce((s,i)=>s+i.qty*i.price,0);
  const timestamp=Date.now();
  const txId='TX'+(''+timestamp).slice(-10);

  try {
    // Save transaction with full product info (incl. pack)
    await db.collection('inventory_transactions').add({
      txId, type:currentMode, store:storeField,
      items:Object.entries(cart).map(([cartKey,d])=>({
        name:d.name, pack:d.pack||null, qty:d.qty, price:d.price, lineTotal:d.qty*d.price
      })),
      total, user:currentUser.email,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    // Update inventory — group by product name (ignore pack variant)
    const batch=db.batch();
    const byProduct={};
    for(const [cartKey,item] of Object.entries(cart)){
      const pName=item.name;
      if(!byProduct[pName]) byProduct[pName]=0;
      byProduct[pName]+=item.qty;
    }
    for(const [pName,qty] of Object.entries(byProduct)){
      const ref=db.collection('inventory').doc(pName);
      batch.set(ref,{[storeField]:firebase.firestore.FieldValue.increment(qty*delta)},{merge:true});
    }
    await batch.commit();
    await loadInventory();
  } catch(e){
    console.error('save error:',e);
    toast('儲存失敗：'+e.message);
    return;
  }

  // Show receipt
  let rh='<div class="receipt-row"><span style="font-weight:600">時間</span><span>'+new Date().toLocaleString('zh-HK')+'</span></div>';
  rh+='<div class="receipt-row"><span style="font-weight:600">分店</span><span>'+(storeField==='central'?'中環店':'始創店')+'</span></div>';
  rh+='<div class="receipt-row"><span style="font-weight:600">單據號</span><span>'+txId+'</span></div>';
  rh+='<div style="border-top:1px dashed var(--bd);margin:.3rem 0"></div>';
  for(const [cartKey,item] of Object.entries(cart)){
    const displayName=item.pack?`${item.name}（${item.pack}）`:item.name;
    rh+=`<div class="receipt-row">
      <span style="flex:1">${displayName}<br><span style="font-size:.7rem;color:var(--muted)">HK$${item.price} × ${item.qty}</span></span>
      <span>HK$${item.qty*item.price}</span>
    </div>`;
  }
  document.getElementById('receiptItems').innerHTML=rh;
  document.getElementById('receiptSub').textContent=
    currentMode==='sale'?'📤 銷售單據':'📥 進貨單據';
  document.getElementById('receiptTotal').textContent='HK$'+total;
  document.getElementById('receiptModal').classList.add('show');
  cart={};
  renderCart();
  toast(currentMode==='sale'?'✅ 銷售已記錄，庫存已扣減':'✅ 進貨已記錄，庫存已增加');
}

    if(!/^[0-9]{4}$/.test(pin)){ toast('手機號碼最後4位必須是數字'); return; }
  }
  
  try{
    if(editingEmpId){
      const updateData = {name, email: email || null, role};
      if(phone) updateData.phone = phone;
      if(pin) updateData.pin = pin;
      await db.collection('employees').doc(editingEmpId).update(updateData);
      toast('已更新');
    } else {
      // Generate a unique doc ID for PIN-only employees
      const empId = email ? email : ('emp_' + Date.now() + '_' + Math.random().toString(36).substr(2,6));
      if(email){
      if(!pwd || pwd.length < 6){ toast('請設定密碼（至少6位）'); return; }
      // Create Firebase Auth via REST API (won't kick admin out)
      const apiKey = firebase.app().options.apiKey;
      const resp = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + apiKey, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, password: pwd, returnSecureToken: false})
      });
      const rd = await resp.json();
      if(!resp.ok){ toast(rd.error && rd.error.message ? rd.error.message : '帳號建立失敗'); return; }
      }
      const newData = {name, email: email || null, role, createdAt: firebase.firestore.FieldValue.serverTimestamp()};
      if(phone) newData.phone = phone;
      if(pin) newData.pin = pin;
      await db.collection('employees').doc(empId).set(newData);
      await db.collection('employees').doc(empId).set(newData);
      if(!email){ toast('員工已建立（PIN 登入，無電郵）'); }
      else { toast('員工帳號已建立'); }
      toast('員工帳號已建立');
    }
    closeAddEmployee();
    renderEmployeeList();
  } catch(err){
    console.error(err);
    toast(err.message || '儲存失敗');
  }
}

// --- Report Tab Functions ---
function setRepQuick(period) {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const today = y + '-' + m + '-' + d;

  if (period === 'today') {
    document.getElementById('repFrom').value = today;
    document.getElementById('repTo').value = today;
  } else if (period === 'month') {
    document.getElementById('repFrom').value = y + '-' + m + '-01';
    document.getElementById('repTo').value = today;
  }
  loadReportData();
}

async function loadReportData() {
  // Force filter row visible - inject if missing or hidden
  (function fixFilter(){
    var f = document.querySelector('#tabContentReport .report-filter');
    if (!f) return;
    f.style.cssText = 'display:flex !important;visibility:visible !important;opacity:1 !important;position:static !important;z-index:9999 !important;height:auto !important;min-height:50px !important;overflow:visible !important;background:#f5f5f5;padding:.8rem;border-radius:8px;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem;align-items:center;';
    // Also ensure parent doesn't clip
    var wrap = document.querySelector('#tabContentReport .report-wrap');
    if (wrap) wrap.style.cssText = 'padding:1.2rem;overflow:visible !important;height:auto !important;';
  })();
  const store = document.getElementById('repStore').value;
  const type = document.getElementById('repType').value;
  const dateFrom = document.getElementById('repFrom').value;
  const dateTo = document.getElementById('repTo').value;

  if (!store) {
    alert('請先選擇分店');
    return;
  }

  console.log('[loadReportData] store:' + store + ' type:' + type + ' from:' + dateFrom + ' to:' + dateTo);

  try {
    let q = db.collection('inventory_transactions')
      .where('store', '==', store);

    if (type) {
      q = q.where('type', '==', type);
    }

    if (dateFrom) {
      q = q.where('createdAt', '>=', dateFrom);
    }
    if (dateTo) {
      // Add 1 day to include the end date
      const d = new Date(dateTo + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      const toStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      q = q.where('createdAt', '<', toStr);
    }

    q = q.orderBy('createdAt', 'desc').limit(200);

    const snap = await q.get();
    console.log('[loadReportData] results:' + snap.size);

    let html = '';
    // 按類型分組
    const groups = { sale:[], purchase:[], transfer:[], loss:[] };
    snap.forEach(doc => {
      const t = doc.data().type || '';
      if(groups[t]) groups[t].push(doc);
      else groups['sale'].push(doc); // default to sale
    });

    html = '';
    const typeLabels = { sale:'🟢 銷售', purchase:'🔵 進貨', transfer:'🟠 調撥', loss:'🔴 報損' };
    const typeOrder = ['sale','purchase','transfer','loss'];

    typeOrder.forEach(type => {
      if(!groups[type].length) return;
      html += '<div class="rep-group-header">' + typeLabels[type] + ' (' + groups[type].length + '筆)</div>';
      groups[type].forEach(doc => {
      const d = doc.data();
      const dt = d.createdAt ? (d.createdAt.toDate ? d.createdAt.toDate() : new Date(d.createdAt)) : null;
      const dateStr = dt ? (dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0') + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0')) : '';
      const typeName = d.type === 'sale' ? '銷售' : (d.type === 'purchase' ? '進貨' : (d.type === 'transfer' ? '調撥' : (d.type === 'loss' ? '報損' : d.type)));
      const items = d.items || [];
      const itemStr = items.map(i => i.name + ' x' + i.qty).join(', ');
      const total = d.total || 0;

      let detailHtml = '<div class="log-entry-detail">';
      detailHtml += '&#x1F4CB; 詳情：<br>';
      items.forEach(i => {
        detailHtml += '• ' + i.name + ' — HK$' + (i.price || 0) + ' x ' + i.qty + ' = HK$' + ((i.price || 0) * i.qty) + '<br>';
      });
      detailHtml += '&#x1F4B0; 總額：HK$' + total + ' &nbsp;&nbsp; &#x1F3EA; 分店：' + (d.store === 'central' ? '中環街市' : '旺角始創');
      detailHtml += '</div>';

      let cancelBtn = '';
      if (d.type === 'sale' || d.type === 'purchase') {
        cancelBtn = '<button class="btn-cancel-tx" onclick="cancelTransaction(\''+ doc.id +'\')">取消交易</button>';
      }
      html += '<div class="log-entry" data-toggle="1">'
        + '<div class="log-entry-header">'
        + '<span class="log-entry-type ' + (d.type || '') + '">' + typeName + '</span>'
        + '<span>' + dateStr + '</span>'
        + '</div>'
        + '<div class="log-entry-items">' + itemStr + '</div>'
        + detailHtml
        + cancelBtn
        + '</div>';
      });
    });

    document.getElementById('repList').innerHTML = html || '<div style="text-align:center;color:var(--muted);padding:2rem">未有交易記錄</div>';
  } catch(e) {
    console.error('[loadReportData] error:', e);
    alert('載入失敗: ' + e.message);
  }
}

// Cancel a sale/purchase transaction
async function cancelTransaction(txId) {
  if (!confirm('確定要取消此交易？')) return;
  
  try {
    const txRef = db.collection('inventory_transactions').doc(txId);
    const txSnap = await txRef.get();
    if (!txSnap.exists) {
      alert('交易不存在');
      return;
    }
    
    const txData = txSnap.data();
    const items = txData.items || [];
    const txType = txData.type;
    
    // Reverse inventory
    for (const item of items) {
      const prodSnap = await db.collection('inventory').where('name', '==', item.name).get();
      if (!prodSnap.empty) {
        const prodDoc = prodSnap.docs[0];
        const currentQty = prodDoc.data().quantity || 0;
        // Sale: add back, Purchase: subtract
        const newQty = txType === 'sale' ? currentQty + item.qty : currentQty - item.qty;
        await prodDoc.ref.update({ quantity: newQty });
      }
    }
    
    // Delete transaction
    await txRef.delete();
    alert('交易已取消');
    loadReportData();
  } catch (e) {
    console.error('Cancel transaction error:', e);
    alert('取消失敗: ' + e.message);
  }
}
