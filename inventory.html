<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祐興倉存管理 | Yau Hing Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- SheetJS for Excel parsing -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#FAFAF8;--bg2:#F0EAE0;--txt:#2D2D2D;--muted:#6B6B6B;--red:#C8462B;--orange:#E07B3A;--green:#2D6A4F;--gold:#D4A843;--bd:#E0D8C8;--sh1:0 2px 8px rgba(0,0,0,.06);--sh2:0 8px 24px rgba(0,0,0,.10);--r:14px;--tr:all .3s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7}

/* --- Top Bar --- */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(250,250,248,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);padding:.5rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.topbar-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;color:var(--txt);white-space:nowrap;cursor:pointer}
.topbar-title small{display:block;font-family:'Noto Sans TC',sans-serif;font-size:.65rem;font-weight:400;color:var(--muted)}

.tab-bar{display:flex;gap:4px;background:var(--bg2);border-radius:50px;padding:3px}
.tab-btn{
  padding:.3rem 1rem;border:none;border-radius:50px;font-size:.78rem;font-weight:500;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);background:transparent;
}
.tab-btn.active{background:white;color:var(--txt);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}

.mode-toggle{display:flex;background:var(--bg2);border-radius:50px;padding:3px;gap:3px}
.mode-btn{
  padding:.35rem 1.1rem;border:none;border-radius:50px;font-size:.8rem;font-weight:500;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);background:transparent;
}
.mode-btn.active{background:var(--red);color:white}
.mode-btn.active-purchase{background:var(--green);color:white}
.mode-btn.active-purchase{background:var(--green);color:white}

.store-badge{
  padding:.35rem .9rem;border-radius:50px;font-size:.78rem;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;border:1.5px solid var(--bd);cursor:pointer;transition:var(--tr);white-space:nowrap;
}
.store-badge.central{background:#FFF3E0;color:#E65100;border-color:#FFB74D}
.store-badge.pioneer{background:#F3E5F5;color:#6A1B9A;border-color:#CE93D8}

.topbar-right{display:flex;align-items:center;gap:.6rem}
.user-info{font-size:.75rem;color:var(--muted)}

/* --- Main Layout --- */
.main-wrap{
  margin-top:68px;display:flex;height:calc(100vh - 68px);
}
.pcat-bar{
  width:170px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);
  padding:1rem .5rem;overflow-y:auto;
}
.pcat-btn{
  display:block;width:100%;padding:.55rem .8rem;text-align:left;
  border:none;background:transparent;border-radius:var(--r);font-size:.85rem;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);color:var(--muted);margin-bottom:2px;
}
.pcat-btn:hover{background:var(--bd);color:var(--txt)}
.pcat-btn.active{background:var(--red);color:white;font-weight:600}
.btn-logout{padding:.3rem .7rem;border:1px solid var(--bd);background:transparent;border-radius:6px;font-size:.72rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:var(--tr);margin-right:.4rem}
.btn-logout:hover{background:var(--red);color:white;border-color:var(--red)}

/* --- Product Grid --- */
.pgrid-area{flex:1;overflow-y:auto;padding:1.2rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;padding-bottom:180px}

.pcard{
  background:white;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--bd);transition:var(--tr);
  box-shadow:var(--sh1);display:flex;flex-direction:column;
}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.pcard-img{
  width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
}
.pcard-img.has-img{background:#f5f0ea}
.pcard-body{padding:.7rem;flex:1;display:flex;flex-direction:column}
.pcard-name{font-family:'Noto Serif TC',serif;font-size:.88rem;font-weight:600;line-height:1.3;margin-bottom:.3rem;color:var(--txt)}
.pcard-price{font-size:.82rem;color:var(--red);font-weight:600;margin-bottom:.2rem}
.pcard-stock{font-size:.72rem;color:var(--muted);margin-bottom:.5rem}
.pcard-stock.low{color:#E65100;font-weight:600}
.pcard-stock.zero{color:#B71C1C;font-weight:600}

/* qty controls */
.qty-ctrl{
  display:flex;align-items:center;gap:.4rem;margin-top:auto;
  background:var(--bg2);border-radius:50px;padding:4px;
}
.qty-btn{
  width:30px;height:30px;border:none;border-radius:50%;background:var(--red);color:white;
  font-size:1.1rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;
}
.qty-btn:hover{background:#a83820;transform:scale(1.1)}
.qty-btn.green{background:var(--green)}
.qty-btn.green:hover{background:#1b4332}
.qty-num{
  flex:1;text-align:center;font-size:.92rem;font-weight:700;
  color:var(--txt);min-width:24px;
}

/* --- Cart Panel --- */
.cart-panel{
  width:340px;flex-shrink:0;background:white;border-left:1px solid var(--bd);
  display:flex;flex-direction:column;
}
.cart-head{
  padding:.8rem 1rem;border-bottom:1px solid var(--bd);
  background:var(--bg2);
}
.cart-head-title{
  font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;
}
.cart-head-sub{font-size:.72rem;color:var(--muted);margin-top:1px}

.cart-items{flex:1;overflow-y:auto;padding:.6rem}
.cart-item{
  display:flex;align-items:center;gap:.6rem;padding:.5rem;
  border-radius:8px;margin-bottom:.4rem;background:var(--bg);
  transition:var(--tr);
}
.cart-item:hover{background:var(--bg2)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:.72rem;color:var(--muted)}
.ci-qty{font-size:.78rem;color:var(--red);font-weight:600;white-space:nowrap}
.ci-total{font-size:.85rem;font-weight:700;color:var(--txt);white-space:nowrap;text-align:right;min-width:50px}
.ci-remove{
  background:none;border:none;font-size:.9rem;cursor:pointer;color:var(--muted);
  padding:2px 4px;border-radius:4px;transition:var(--tr);flex-shrink:0;
}
.ci-remove:hover{color:var(--red);background:#FFEBEE}

.cart-empty{
  text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.85rem
}
.cart-empty-icon{font-size:3rem;margin-bottom:.6rem;opacity:.3}

.cart-foot{padding:1rem;border-top:1px solid var(--bd);background:var(--bg2)}
.cart-summary{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;
}
.cart-summary-label{font-size:.82rem;color:var(--muted)}
.cart-summary-val{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:700;color:var(--red)}
.cart-total-items{font-size:.72rem;color:var(--muted);margin-bottom:.8rem}
.cart-total-items span{font-weight:600;color:var(--txt)}

.cart-actions{display:flex;flex-direction:column;gap:.5rem}
.btn-confirm{
  width:100%;padding:.8rem;border:none;border-radius:50px;
  font-size:.9rem;font-weight:600;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-confirm-sale{background:var(--red);color:white}
.btn-confirm-sale:hover{background:#a83820;transform:scale(1.02)}
.btn-confirm-purchase{background:var(--green);color:white}
.btn-confirm-purchase:hover{background:#1b4332;transform:scale(1.02)}
.btn-clear{background:transparent;border:1.5px solid var(--bd);color:var(--muted);border-radius:50px;padding:.45rem;font-size:.78rem;cursor:pointer;transition:var(--tr)}
.btn-clear:hover{border-color:var(--red);color:var(--red)}

/* Export Button */
.btn-export{padding:.45rem .9rem;border:none;border-radius:50px;font-size:.78rem;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:var(--tr);background:var(--green);color:white;display:flex;align-items:center;gap:.3rem}
.btn-export:hover{background:#236B3F;transform:scale(1.02)}
.btn-export::before{content:'📊'}

/* receipt */
.receipt-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.receipt-modal.show{opacity:1;pointer-events:all}
.receipt-box{
  background:white;border-radius:16px;max-width:360px;width:100%;
  max-height:90vh;overflow-y:auto;padding:1.5rem;box-shadow:var(--sh3);
}
.receipt-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:.2rem}
.receipt-sub{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:1rem}
.receipt-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px dashed var(--bd);font-size:.85rem}
.receipt-row:last-child{border:none}
.receipt-total{background:var(--bg2);border-radius:8px;padding:.6rem .8rem;margin-top:.6rem;display:flex;justify-content:space-between;align-items:center}
.receipt-total-label{font-weight:700}
.receipt-total-amt{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:700;color:var(--red)}
.receipt-actions{margin-top:1rem;display:flex;flex-direction:column;gap:.5rem}
.btn-receipt-ok{
  width:100%;padding:.7rem;border:none;border-radius:50px;
  background:var(--green);color:white;font-size:.9rem;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;
}
.btn-receipt-close{width:100%;padding:.5rem;border:1.5px solid var(--bd);border-radius:50px;background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem}

/* confirm dialog */
.confirm-dialog{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.confirm-dialog.show{opacity:1;pointer-events:all}
.confirm-box{background:white;border-radius:16px;padding:1.5rem;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
.confirm-msg{font-size:.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.5}
.confirm-btns{display:flex;gap:.6rem}
.confirm-yes{flex:1;padding:.6rem;border:none;border-radius:50px;background:var(--red);color:white;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.confirm-no{flex:1;padding:.6rem;border:1.5px solid var(--bd);border-radius:50px;background:transparent;color:var(--muted);cursor:pointer}

/* toast */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);
  background:#2D2D2D;color:white;padding:.6rem 1.2rem;border-radius:50px;
  font-size:.82rem;z-index:3000;transition:transform .4s cubic-bezier(.4,0,.2,1);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* auth */
.auth-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:5000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.auth-box{background:white;border-radius:16px;padding:2rem;max-width:360px;width:100%;box-shadow:var(--sh2)}
.auth-title{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.auth-sub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.auth-field{margin-bottom:.8rem}
.auth-label{font-size:.78rem;font-weight:600;margin-bottom:.3rem;display:block;color:var(--muted)}
.auth-input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.88rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:var(--tr)}
.auth-input:focus{border-color:var(--red)}
.auth-btn{width:100%;padding:.75rem;border:none;border-radius:50px;background:var(--red);color:white;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:.6rem}
.auth-error{font-size:.75rem;color:var(--red);margin-top:.4rem;text-align:center;min-height:1em}

/* PIN Login */
.pin-login-divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0 .8rem;color:var(--muted)}
.pin-login-divider::before,.pin-login-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.auth-forgot-link{text-align:center;margin-top:.8rem;font-size:.8rem}
.auth-forgot-link a{color:var(--muted);text-decoration:underline}
.pin-login-label{font-size:.75rem;white-space:nowrap;font-weight:500}
.pin-inputs{display:flex;justify-content:center;gap:.5rem;margin-bottom:.6rem}
.pin-digit{width:48px;height:54px;border:2px solid var(--bd);border-radius:10px;font-size:1.4rem;font-weight:700;text-align:center;outline:none;transition:var(--tr);font-family:'Courier New',monospace;background:#FAFAFA}
.pin-digit:focus{border-color:var(--green);background:white;box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.pin-single{width:200px;height:54px;font-size:2rem;font-family:'Courier New',monospace;font-weight:700;letter-spacing:2rem;padding-left:20px;text-align:left;border:2px solid var(--bd);border-radius:10px;outline:none;background:#FAFAFA;box-sizing:border-box;transition:var(--tr)}
.pin-single:focus{border-color:var(--green);background:white;box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.pin-hint{font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:.8rem}
.pin-btn{width:100%;padding:.65rem;border:none;border-radius:50px;background:var(--green);color:white;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:var(--tr)}
.pin-btn:hover{background:#236B3F}
.pin-btn:disabled{background:#ccc;cursor:not-allowed}
.pin-lock-msg{font-size:.72rem;color:var(--red);text-align:center;margin-top:.4rem;display:none}

/* Phone field in employee form */
.emp-phone-field{margin-top:.3rem}

@media(max-width:768px){
  .topbar{flex-direction:column;align-items:stretch;height:auto;padding:.4rem .6rem;gap:.35rem}
  .topbar-title{font-size:.9rem;margin-bottom:.2rem}
  .topbar-title small{font-size:.7rem}
  .topbar-right{order:-1;position:absolute;top:.4rem;right:.6rem}
  .tab-bar,.mode-toggle{width:100%;justify-content:center}
  .tab-btn,.mode-btn{padding:.35rem .8rem;font-size:.75rem}
  .main-wrap{margin-top:130px;display:flex;flex-direction:column;height:calc(100vh - 130px)}
  .pcat-bar{display:flex;flex-direction:row;width:100%;height:auto;max-height:50px;overflow-x:auto;overflow-y:hidden;padding:.5rem;border-right:none;border-bottom:1px solid var(--bd);gap:4px;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0}
  .pcat-bar::-webkit-scrollbar{display:none}
  .pcat-btn{display:inline-block;width:auto;white-space:nowrap;padding:.35rem .6rem;font-size:.75rem;margin-bottom:0;flex-shrink:0;border-radius:16px;background:var(--bg1);border:1px solid var(--bd)}
  .pcat-btn.active{background:var(--red);color:white;border-color:var(--red)}
  .pgrid-area{flex:1;overflow-y:auto;min-height:0;height:100%;box-sizing:border-box}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));padding-bottom:0}
  .cart-panel{position:fixed;right:0;top:68px;bottom:0;width:100%;transform:translateX(100%);transition:transform .3s;z-index:900}
  .cart-panel.open{transform:translateX(0)}
  .cart-btn-mobile{display:flex !important}
}
.cart-btn-mobile{
  display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:800;
  background:var(--red);color:white;border:none;border-radius:50%;width:56px;height:56px;
  font-size:1.5rem;box-shadow:var(--sh2);cursor:pointer;
  align-items:center;justify-content:center;
}

/* Locked store filter for non-admin/SM */
.locked-filter{opacity:.6;cursor:not-allowed;pointer-events:none;background:var(--bg2) !important;border-color:var(--bd) !important}

/* --- Tab Content --- */
.tab-content{display:none}
.tab-content.active{display:block}

/* Inventory Report Tab */
.report-wrap{padding:1.2rem;overflow-y:auto;height:calc(100vh - 68px)}
.log-wrap{display:flex;gap:1.2rem;padding:1.2rem;height:auto;min-height:calc(100vh - 68px);overflow:visible}
.log-sidebar{width:180px;flex-shrink:0;display:flex;flex-direction:column;gap:.4rem;overflow-y:auto;padding-right:.2rem}
.log-card{background:white;border-radius:12px;padding:.9rem;border:1px solid var(--bd);text-align:center}
.log-card .num{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:var(--red)}
.quick-btns{display:flex;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap;justify-content:center}
.quick-btn{background:#f5f5f5;border:1px solid #ddd;border-radius:12px;padding:.3rem .6rem;font-size:.75rem;cursor:pointer;transition:all .2s}
.quick-btn:hover{background:#e0e0e0}
.quick-btn.active{background:var(--red);color:white;border-color:var(--red)}
.log-date-card input[type="date"]{width:100%;padding:.3rem;border:1px solid #ddd;border-radius:8px;font-size:.85rem;text-align:center}

.log-card .num.green{color:var(--green)}
.log-card .num.blue{color:#1565C0}
.log-card .label{font-size:.95rem;color:var(--muted);margin-top:.15rem}
.log-card.date-btn{background:#E8D84F;cursor:pointer;border:2px solid #D4A843;transition:all .2s}
.log-card.date-btn:hover{background:#DDD540;transform:scale(1.02)}
.log-card.date-btn .label{font-weight:600;color:#5D4E00}
.log-main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.8rem}
.report-summary{
  display:flex;flex-wrap:wrap;gap:.8rem;margin-bottom:1.2rem;
}
.report-summary .report-card{
  background:#fff;border-radius:12px;padding:1.2rem .8rem;min-height:140px;border:1px solid #ddd;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.08);display:flex;flex-direction:column;justify-content:center;
}
.report-card .num{font-family:'Noto Serif TC',serif;font-size:1.8rem;font-weight:700;color:var(--red)}
.report-card .num.green{color:var(--green)}
.report-card .num.orange{color:var(--orange)}
.report-card .label{font-size:.75rem;color:var(--muted);margin-top:.2rem}

.report-section{margin-bottom:1.5rem}
.report-section-title{
  font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;margin-bottom:.8rem;
  display:flex;align-items:center;gap:.5rem;
}
.report-section-title .badge{
  padding:.15rem .6rem;border-radius:50px;font-size:.7rem;font-weight:600;
}
.badge-red{background:#FFEBEE;color:#C62828}
.badge-orange{background:#FFF3E0;color:#E65100}
.badge-green{background:#E8F5E9;color:#2E7D32}
.badge-blue{background:#E3F2FD;color:#1565C0}

.report-table{background:white;border-radius:12px;overflow:hidden;border:1px solid var(--bd)}
.report-table table{width:100%;border-collapse:collapse;font-size:.82rem}
.report-table th{
  background:var(--bg2);padding:.6rem .8rem;text-align:left;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;border-bottom:1px solid var(--bd);
}
.report-table td{padding:.55rem .8rem;border-bottom:1px solid var(--bg);vertical-align:middle}
.report-table tr:last-child td{border:none}
.report-table tr:hover td{background:#FAFAF8}
.stock-ok{color:var(--green);font-weight:600}
.stock-low{color:var(--orange);font-weight:600}
.stock-zero{color:var(--red);font-weight:600}
.report-filter{
  display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;
}
.filter-select{
  padding:.4rem .8rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.8rem;
  font-family:'Noto Sans TC',sans-serif;background:white;cursor:pointer;
}
.filter-input{
  padding:.4rem .8rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.8rem;
  font-family:'Noto Sans TC',sans-serif;outline:none;
}
.filter-input:focus{border-color:var(--red)}
.report-filter .filter-label{font-size:.78rem;color:var(--muted)}

function showPinLogin(){

function checkPinLock(){
  const lockMsg = document.getElementById('pinLockMsg');
  const btn = document.getElementById('pinLoginBtn');
  if(pinLockedUntil > Date.now()){
    const remain = Math.ceil((pinLockedUntil - Date.now()) / 1000);
    lockMsg.textContent = 'PIN 已鎖定，請等待 ' + remain + ' 秒';
    lockMsg.style.display = 'block';
    btn.disabled = true;
    // Clear existing digits
    document.querySelectorAll('.pin-digit').forEach(d=>{d.value='';d.disabled=true;});
    // Countdown timer
    clearInterval(window._pinTimer);
    window._pinTimer = setInterval(()=>{
      if(pinLockedUntil <= Date.now()){
        clearInterval(window._pinTimer);
        lockMsg.style.display='none';
        btn.disabled = false;
        document.querySelectorAll('.pin-digit').forEach(d=>d.disabled=false);
        document.querySelector('.pin-digit').focus();
      } else {
        const r = Math.ceil((pinLockedUntil - Date.now()) / 1000);
        lockMsg.textContent = 'PIN 已鎖定，請等待 ' + r + ' 秒';
      }
    }, 1000);
  } else {
    lockMsg.style.display='none';
    btn.disabled = false;
    document.querySelectorAll('.pin-digit').forEach(d=>d.disabled=false);
  }
}

async function pinLogin(){
  const pin = document.getElementById('pinInput').value;
  
  if(pin.length !== 4){
    document.getElementById('authError').textContent = '請輸入完整 4 位 PIN';
    return;
  }
  
  // Check lock
  if(pinLockedUntil > Date.now()){ checkPinLock(); return; }
  
  document.getElementById('authError').textContent = '';
  const btn = document.getElementById('pinLoginBtn');
  btn.textContent = '驗證中...';
  btn.disabled = true;
  
  try {
    // Query Firestore for matching PIN
    const snap = await db.collection('employees').where('pin', '==', pin).get();
    
    if(snap.empty){
      handlePinFail('PIN 不正確');
      return;
    }
    
    if(snap.size > 1){
      // Multiple matches — rare case, show names to pick
      btn.textContent = '確認登入';
      btn.disabled = false;
      document.getElementById('authError').textContent = '發現多個帳號，請用電郵登入';
      // Reset PIN inputs
      digits.forEach(d=>d.value='');
      digits[0].focus();
      return;
    }
    
    // Exactly 1 match — login successful
    const empData = snap.docs[0].data();
    const empId = snap.docs[0].id;
    
    // Set user state (mock user object for PIN login)
    currentUser = {
      email: empData.email || ('pin@' + empId),
      isPinLogin: true,
      uid: 'pin_' + empId
    };
    
    // Determine role/store from employee record
    console.log('[PIN] empData:', JSON.stringify(empData));  // DEBUG: show full employee record
    const role = empData.role || '';
    const empStore = empData.store || '';  // Prefer explicit store field
    isAdminUser = (role === 'admin' || role === 'sm');
    isSMUser = (role === 'sm');
    console.log('[PIN] role='+role+' isAdminUser='+isAdminUser+' isSMUser='+isSMUser+' userStore='+userStore);  // DEBUG

    // Store priority: explicit store field > infer from role > null

function handlePinFail(msg){
  pinFailCount++;
  const btn = document.getElementById('pinLoginBtn');
  btn.textContent = '確認登入';
  btn.disabled = false;
  document.getElementById('authError').textContent = msg;
  
  // Clear PIN inputs
  document.querySelectorAll('.pin-digit').forEach(d=>{d.value='';});
  document.querySelector('.pin-digit').focus();
  
  // Lock after 5 failed attempts
  if(pinFailCount >= 5){
    pinLockedUntil = Date.now() + (5 * 60 * 1000); // 5 minutes
    pinFailCount = 0;
    checkPinLock();
  }
}

// --- Product Grid ---
function parseMultiPrice(priceStr){
  // priceStr like "HKD 25 (細樽裝) / HKD 40 (大樽裝)"
  const result={};
  if(!priceStr||!priceStr.includes('/')) return result;
  priceStr.split(' / ').forEach(seg=>{
    const m=seg.match(/HKD\s*([\d.]+)\s*\(([^)]+)\)/);
    if(m) result[m[2]]=parseFloat(m[1]);
  });
  return result;
}

function getPackOptions(p){
  if(!p.label1) return null;
  const multiPrices=parseMultiPrice(p.price);
  const opts=[];
  if(p.label1) opts.push({label:p.label1,img:p.img1,price:multiPrices[p.label1]||0});
  if(p.label2) opts.push({label:p.label2,img:p.img2,price:multiPrices[p.label2]||0});
  return opts.length>0?opts:null;
}

function getSelectedPack(p){
  const saved=selectedPack[p.name];
  const opts=getPackOptions(p);
  if(!opts) return null;
  return saved&&opts.find(o=>o.label===saved)?saved:opts[0].label;
}

function getPackPrice(p,packLabel){
  const opts=getPackOptions(p);
  if(!opts) return getPriceNum(p.price);
  const opt=opts.find(o=>o.label===packLabel);
  if(opt) return opt.price;
  return getPriceNum(p.price);
}

function getPackImg(p,packLabel){
  const opts=getPackOptions(p);
  if(!opts) return p.local_img||null; // single-pack: local_img already has correct filename
  // Multi-pack: use img1 or img2 filename from opts
  const opt=opts.find(o=>o.label===packLabel)||opts[0];
  return opt.img||p.local_img||null;
}

    if(String(p.name||'').includes('現金')||String(p.name||'').includes('外購')){
      const mp=prompt('請輸入實際金額（'+p.name+'）\n（預設：'+cart[cartKey].price+'）','');
      if(mp!==null&&mp!==''){
        const mv=parseFloat(mp);
        if(!isNaN(mv)&&mv>0){cart[cartKey].manualPrice=mv;}
      }
    }
  }
  cart[cartKey].qty+=delta;
  if(cart[cartKey].qty<=0){delete cart[cartKey];}
  renderCart();
  renderGrid();
}

function renderCart(){
  const container=document.getElementById('cartItems');
  const keys=Object.keys(cart);
  if(keys.length===0){
    container.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div>尚未加入任何項目<br>從左邊選擇產品</div>`;
    document.getElementById('cartTotal').textContent='HK$0';
    document.getElementById('cartCount').innerHTML='共 <span>0</span> 款產品';
    return;
  }
  let total=0;let html='';let count=0;
  keys.forEach(cartKey=>{
    const item=cart[cartKey];
    const lineTotal=item.qty*(item.manualPrice||item.price);
    total+=lineTotal;count+=item.qty;
    const displayName=item.pack?`${item.name}（${item.pack}）`:item.name;
    html+=`<div class="cart-item">
      <div class="ci-info"><div class="ci-name">${displayName}</div><div class="ci-price">HK$${(item.manualPrice||item.price)}/件</div></div>
      <div class="ci-qty">×${item.qty}</div>
      <div class="ci-total">HK$${lineTotal}</div>
      <button class="ci-remove" onclick="removeItem('${cartKey.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  });
  container.innerHTML=html;
  document.getElementById('cartTotal').textContent='HK$'+total;
  document.getElementById('cartCount').innerHTML=`共 <span>${count}</span> 件產品，<span>${keys.length}</span> 款`;
}

function removeItem(cartKey){delete cart[cartKey];renderCart();renderGrid();}
function clearCart(){cart={};renderCart();renderGrid();}

function getPriceNum(priceStr){

}

async function doConfirm(){
  closeConfirm();
  const storeField=currentStore;
  const delta=currentMode==='sale'?-1:1;
  const total=Object.values(cart).reduce((s,i)=>s+i.qty*(i.manualPrice||i.price),0);
  const timestamp=Date.now();
  const txId='TX'+(''+timestamp).slice(-10);

  try {
    // Save transaction with full product info (incl. pack)
    await db.collection('inventory_transactions').add({
      txId, type:currentMode, store:storeField,
      items:Object.entries(cart).map(([cartKey,d])=>({
        name:d.name, pack:d.pack||null, qty:d.qty, price:(d.manualPrice||d.price), lineTotal:d.qty*(d.manualPrice||d.price)
      })),
      total, user:currentUser.email,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    // Update inventory — group by product name (ignore pack variant)
    const batch=db.batch();
    const byProduct={};
    for(const [cartKey,item] of Object.entries(cart)){
      const pName=item.name;
      if(!byProduct[pName]) byProduct[pName]=0;
      byProduct[pName]+=item.qty;
    }
    for(const [pName,qty] of Object.entries(byProduct)){
      const ref=db.collection('inventory').doc(pName);
      batch.set(ref,{[storeField]:firebase.firestore.FieldValue.increment(qty*delta)},{merge:true});
    }
    await batch.commit();
    await loadInventory();
  } catch(e){
    console.error('save error:',e);
    toast('儲存失敗：'+e.message);
    return;
  }

  // Show receipt
  let rh='<div class="receipt-row"><span style="font-weight:600">時間</span><span>'+new Date().toLocaleString('zh-HK')+'</span></div>';
  rh+='<div class="receipt-row"><span style="font-weight:600">分店</span><span>'+(storeField==='central'?'中環店':'始創店')+'</span></div>';
  rh+='<div class="receipt-row"><span style="font-weight:600">單據號</span><span>'+txId+'</span></div>';
  rh+='<div style="border-top:1px dashed var(--bd);margin:.3rem 0"></div>';
  for(const [cartKey,item] of Object.entries(cart)){
    const displayName=item.pack?`${item.name}（${item.pack}）`:item.name;
    rh+=`<div class="receipt-row">
      <span style="flex:1">${displayName}<br><span style="font-size:.7rem;color:var(--muted)">HK$${item.price} × ${item.qty}</span></span>
      <span>HK$${item.qty*item.price}</span>
    </div>`;
  }
  document.getElementById('receiptItems').innerHTML=rh;
  document.getElementById('receiptSub').textContent=
    currentMode==='sale'?'📤 銷售單據':'📥 進貨單據';
  document.getElementById('receiptTotal').textContent='HK$'+total;
  document.getElementById('receiptModal').classList.add('show');
  cart={};
  renderCart();
  toast(currentMode==='sale'?'✅ 銷售已記錄，庫存已扣減':'✅ 進貨已記錄，庫存已增加');
}

function exportLogToExcel(){
  try {
    const store = document.getElementById('logStore').value;
    const from = document.getElementById('logFromDate').value;
    const to = document.getElementById('logToDate').value;
    
    // Header rows (no amount)
    const header = [
      ['祐興食品 - 交易記錄', '', '', '', '', ''],
      ['分店', store==='all'?'全部':store==='central'?'中環店':'始創店', '', '', '', ''],
      ['日期範圍', from && to ? from + ' 至 ' + to : '全部', '', '', '', ''],
      [],
      ['時間', '類型', '分店', '產品', '數量', '金額']
    ];
    
    const entries = document.querySelectorAll('.log-entry');
    
    // Build data rows with numeric amounts
    const dataRows = [];
    entries.forEach(entry => {
      const meta = entry.querySelector('.log-meta')?.textContent || '';
      const type = entry.querySelector('.log-type')?.textContent || '';
      const items = entry.querySelector('.log-items')?.textContent || '';
      const totalText = entry.querySelector('.log-total')?.textContent || '';
      const totalNum = parseFloat(totalText.replace(/[^\d.]/g, '')) || 0;
      dataRows.push([meta, type, '', items, '', totalNum]);
    });
    
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(header);
    
    // Append data rows (F column = raw number)
    if(dataRows.length > 0){
      XLSX.utils.sheet_add_aoa(ws, dataRows, {origin: 6});
    }
    
    // Write F column with currency format that won't trigger openpyxl date detection
    // Clear any cells beyond data rows to avoid stray values
    const lastDataRow = 5 + dataRows.length; // header(5) + data
    for(let r = 6; r <= 100; r++){
      if(r <= lastDataRow){
        // Within data range - set format
        const idx = r - 6;
        if(idx < dataRows.length){
          ws['F' + r] = { t:'n', v: dataRows[idx][5], z: '$#,##0' };
        }
      } else {
        // Beyond data - clear cell
        delete ws['F' + r];
      }
    }
    
    XLSX.utils.book_append_sheet(wb, ws, '交易記錄');
    XLSX.writeFile(wb, '交易記錄_' + new Date().toISOString().split('T')[0] + '.xlsx');
    toast('✅ 記錄已匯出為 Excel');
  } catch(e) {
    console.error('Export log error:', e);
    toast('❌ 匯出失敗：' + e.message);
  }
}

async function renderReport(){
  let txns=[];
  try {
    const snap=await db.collection('inventory_transactions').orderBy('createdAt','desc').limit(200).get();
    snap.forEach(d=>txns.push(d.data()));
  } catch(e){console.error(e);}

  // === Calculate inventory health metrics ===
  const LOW_THRESHOLD = 10;
  const OVER_THRESHOLD = 100;
  let outOfStock=0, lowStock=0, overStock=0;

  products.forEach(p=>{
    const inv=inventory[p.name]||{};
    const total=(inv.central??0)+(inv.pioneer??0);
    if(total===0) outOfStock++;
    else if(total<LOW_THRESHOLD) lowStock++;
    else if(total>OVER_THRESHOLD) overStock++;
  });

  // Calculate 30-day turnover rate
  const now=new Date();
  const thirtyDaysAgo = new Date(now.getTime()-30*24*60*60*1000);
  const recentSales = txns.filter(t=>{
    if(t.type!=='sale') return false;
    const d = t.createdAt?.toDate?t.createdAt.toDate():new Date(t.createdAt);
    return d >= thirtyDaysAgo;
  });
  const totalSold = recentSales.reduce((s,i)=>s+(i.qty||i.items?.reduce((a,b)=>a+(b.qty||0),0)||0),0);
  const avgInventory = products.reduce((s,p)=>{
    const inv=inventory[p.name]||{};
    return s+(inv.central??0)+(inv.pioneer??0);
  },0) / (products.length||1);
  const turnover = avgInventory>0 ? (totalSold/30/avgInventory).toFixed(2) : '0';

  // === Render 4 health cards ===
  document.getElementById('reportSummary').innerHTML='<div style="display:flex;flex-direction:column;gap:.8rem;width:100%"><div class="report-card" style="min-height:100px;background:#fff;border-radius:12px;border:1px solid #ddd;box-shadow:0 2px 6px rgba(0,0,0,0.08);width:100%"></div><div style="display:flex;gap:.8rem;width:100%;flex-wrap:wrap"><div class="report-card" style="border-left:4px solid #f44336;flex:1;min-width:140px"><div class="num">'+outOfStock+'</div><div class="label">⚠️ 缺貨 (庫存=0)</div></div><div class="report-card" style="border-left:4px solid #ff9800;flex:1;min-width:140px"><div class="num">'+lowStock+'</div><div class="label">⚡ 低庫存 (<'+LOW_THRESHOLD+')</div></div><div class="report-card" style="border-left:4px solid #4caf50;flex:1;min-width:140px"><div class="num">'+overStock+'</div><div class="label">📦 過剩庫存 (>'+OVER_THRESHOLD+')</div></div><div class="report-card" style="border-left:4px solid #2196f3;flex:1;min-width:140px"><div class="num">'+turnover+'</div><div class="label">🔄 平均周轉率 (次/月)</div></div></div></div>';

  // === Build product table with health indicators ===
  const prodMap={};
  const LOW=10;
  products.forEach(p=>{
    const inv=inventory[p.name]||{};
    const central=inv.central??0;
    const pioneer=inv.pioneer??0;
    const total=central+pioneer;
    let status='stock-ok',statusText='充足',badge='badge-green';
    const isDiscontinued = discontinuedSkus.includes(p.sku || '');
    if(isDiscontinued){
      status='stock-disc'; statusText='停售'; badge='badge-grey';
    } else if(total===0){
      status='stock-out'; statusText='缺貨'; badge='badge-red';
    } else if(total<LOW){
      status='stock-low'; statusText='低庫存'; badge='badge-orange';
    }
    const suggestRestock = status==='stock-out' ? LOW : (status==='stock-low'?(LOW-total):0);
    prodMap[p.sku]={
      sku:p.sku, name:p.name, cat:p.cat||'',
      central, pioneer, total, status, statusText, badge, suggestRestock
    };
  });

  // Sort by total stock ascending (low stock first)
  const rows=Object.values(prodMap).sort((a,b)=>a.total-b.total);

  const rowsHtml = rows.length===0?
    '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">暫無數據</td></tr>':
    rows.map(r=>`<tr style="${r.status==='stock-out'?'background-color:#ffebee;':(r.status==='stock-low'?'background-color:#fff3e0;':'')}">
      <td>${r.sku}</td>
      <td style="font-weight:600">${r.name}</td>
      <td>${r.cat}</td>
      <td style="text-align:center">${r.central}</td>
      <td style="text-align:center">${r.pioneer}</td>
      <td style="text-align:center;font-weight:700">${r.total}</td>
      <td><span class="badge ${r.badge}">${r.statusText}</span></td>
      <td style="text-align:center;color:#2196f3;font-weight:600">${r.suggestRestock>0?r.suggestRestock:'-'}</td>
    </tr>`).join('');

  document.getElementById('reportBody').innerHTML = rowsHtml;
}

async function renderLog(){

    snap.forEach(d=>txns.push({id:d.id,...d.data()}));
  } catch(e){console.error(e);}

  const now2 = new Date();
  const y=now2.getFullYear(), m=now2.getMonth(), d=now2.getDate();
  const todayStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  let fromDate=null, toDate=null;

  // 讀取日期輸入框
  const fromVal = document.getElementById('logFromDate')?.value;
  const toVal = document.getElementById('logToDate')?.value;
  if(fromVal && toVal){
    fromDate = new Date(fromVal+'T00:00:00');
    toDate = new Date(toVal+'T23:59:59');

    // 預設顯示今日
    fromDate = new Date(todayStr+'T00:00:00');
    toDate = new Date(todayStr+'T23:59:59');
  }

  const inDateRange = (t) => {
    const d2 = t.createdAt ? t.createdAt.toDate() : new Date();
    const todayMatch = fromDate <= d2 && d2 <= toDate;
    return todayMatch;
  };

  const storeFilter=document.getElementById('logStore').value;
  const typeFilter=document.getElementById('logType').value;
  txns=txns.filter(t=>{
    if(storeFilter!=='all'&&t.store!==storeFilter) return false;

    return true;

  const sales = txns.filter(t=>t.type==='sale'&&inDateRange(t)).reduce((s,t)=>s+(t.total||0),0);
  const purchase = txns.filter(t=>t.type==='purchase'&&inDateRange(t)).reduce((s,t)=>s+(t.total||0),0);
  const net = sales - purchase;
  // todayStr already defined above

  // Left sidebar cards
  document.getElementById('logSidebar').innerHTML =
    '<div style="height:70px;flex-shrink:0"></div>' +
    '<div class="log-card" style="background:#e8f5e9;border-left:4px solid #4caf50"><div class="label">銷售</div><div class="num" style="color:#2e7d32;font-weight:700">HK$'+sales.toLocaleString()+'</div></div>' +
    '<div class="log-card" style="background:#fff3e0;border-left:4px solid #ff9800"><div class="label">進貨</div><div class="num" style="color:#e65100;font-weight:700">HK$'+purchase.toLocaleString()+'</div></div>' +
    '<div class="log-card" style="background:#e3f2fd;border-left:4px solid #2196f3"><div class="label">淨額</div><div class="num" style="color:#1565c0;font-weight:700">'+(net>=0?'+':'')+'HK$'+net.toLocaleString()+'</div></div>';
    

  // Right side: summary + list
  document.getElementById('logSummary').innerHTML = '';

  if(txns.length===0){
      // Event delegation for date confirm button (inline onclick unreliable in WebView)
  const _dcBtn = document.getElementById('logDateConfirmBtn');
  if(_dcBtn) _dcBtn.addEventListener('click', function(){ onDateRangeChange(); });

document.getElementById('logList').innerHTML='<div style="text-align:center;padding:3rem;color:var(--muted)">暫無交易記錄<br><small>在POS頁面完成交易後，記錄會顯示在這裡</small></div>';
    return;
  }

  document.getElementById('logList').innerHTML=txns.map(t=>{
    const dt=t.createdAt?new Date(t.createdAt.toDate()):new Date();
    const dtStr=dt.toLocaleString('zh-HK',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const itemsStr=t.items&&t.items.length>0?
      t.items.map(i=>`${i.name}${i.pack?'('+i.pack+')':''} × ${i.qty}`).join(', '):'—';
    const adminBtns = (isAdminUser || isSMUser) ? '<button class="log-edit-btn" onclick="editTransaction(\'' + t.id + '\')">✏️</button><button class="log-del-btn" onclick="deleteTransaction(\'' + t.id + '\')">🗑️</button>' : '';
    return '<div class="log-entry">' +

        '<div class="log-items">' + itemsStr + '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:.5rem;">' +
        '<div class="log-total">HK$' + (t.total||0) + '</div>' +

// --- Invoice Upload Functions ---
async function handleInvoiceUpload(input){
  const file=input.files[0];
  if(!file) return;
  
  const preview=document.getElementById('invoicePreview');
  preview.textContent='正在解析發票...';
  
  try{
    const arrayBuffer=await file.arrayBuffer();
    const data=new Uint8Array(arrayBuffer);
    
    // Use SheetJS to parse Excel
    const workbook=XLSX.read(data,{type:'array'});
    const sheetName=workbook.SheetNames[0];
    const sheet=workbook.Sheets[sheetName];
    const jsonData=XLSX.utils.sheet_to_json(sheet,{header:1});
    
    // Parse invoice data (rows 22-29 typically contain products)
    const invoiceItems=[];
    let invoiceNumber='';
    let customerName='';
    
    // Find invoice number and customer
    for(let i=0;i<jsonData.length;i++){
      const row=jsonData[i];
      if(row[0] && String(row[0]).includes('發票號碼')){
        invoiceNumber=String(row[1]||row[2]||'').trim();
      }
      if(row[0] && String(row[0]).includes('客戶名稱')){
        customerName=String(row[1]||row[2]||'').trim();
      }
    }
    
    // Detect store from customer name
    let targetStore=currentStore;
    if(customerName.includes('中環')) targetStore='central';
    else if(customerName.includes('始創')) targetStore='pioneer';
    
    // Parse product rows (flexible column detection)
    for(let i=0;i<jsonData.length;i++){
      const row=jsonData[i];
      if(!row || row.length<3) continue;
      
      // Try to find SKU pattern (YHxxx) in any column
      let sku='';
      let name='';
      let qty=0;
      
      for(let col=0;col<row.length;col++){
        const cellValue=row[col];
        if(!cellValue) continue;
        
        const strValue=String(cellValue).trim();
        
        // Check for SKU pattern (YH followed by digits)
        if(!sku && /^YH\d+[A-Z]?$/i.test(strValue)){
          sku=strValue.toUpperCase();
        }
        // Check for quantity (number that looks like quantity)
        else if(!qty && !isNaN(parseFloat(strValue)) && parseFloat(strValue)>0 && parseFloat(strValue)<10000){
          // Make sure it's not the price (usually larger or has decimal)
          const numVal=parseFloat(strValue);
          if(numVal<1000 || Number.isInteger(numVal)){
            qty=Math.floor(numVal);
          }
        }
        // Check for product name (contains Chinese characters and is longer)
        else if(!name && strValue.length>3 && /[\u4e00-\u9fa5]/.test(strValue) && !strValue.includes('發票') && !strValue.includes('客戶')){
          name=strValue;
        }
      }
      
      if(sku && name && qty>0){
        // Find matching product in products.json
        const product=products.find(p=>p.sku===sku || p.name===name || name.includes(p.name) || p.name.includes(name.substring(0,5)));
        if(product){
          invoiceItems.push({
            sku:sku,
            name:product.name,
            qty:qty
          });
        }
      }
    }
    
    if(invoiceItems.length===0){
      preview.textContent='❌ 未能識別發票產品資料';
      return;
    }
    
    // Show preview
    let previewHtml=`✅ 識別到 ${invoiceItems.length} 款產品<br>`;
    previewHtml+=`<small>發票：${invoiceNumber || 'N/A'} | 客戶：${customerName || 'N/A'}</small><br>`;
    previewHtml+=`<div style="max-height:100px;overflow-y:auto;margin-top:.4rem;text-align:left;background:#f5f5f5;padding:.4rem;border-radius:6px;">`;
    invoiceItems.forEach(item=>{
      previewHtml+=`• ${item.name} × ${item.qty}<br>`;
    });
    previewHtml+=`</div>`;
    previewHtml+=`<button onclick="confirmInvoiceRestock(${JSON.stringify(invoiceItems).replace(/"/g,'&quot;')},'${targetStore}')" class="btn-confirm btn-confirm-purchase" style="margin-top:.5rem;width:100%;font-size:.8rem;padding:.4rem;">確認入庫</button>`;
    preview.innerHTML=previewHtml;
    
  }catch(err){
    console.error('Invoice parse error:',err);
    preview.textContent='❌ 解析失敗：'+err.message;
  }
}

async function confirmInvoiceRestock(items,targetStore){
  if(!targetStore){
    toast('請先選擇分店');
    return;
  }
  
  if(!confirm(`確認將 ${items.length} 款產品入庫到 ${targetStore==='central'?'中環店':'始創店'}？`)) return;
  
  try{
    const batch=db.batch();
    const timestamp=firebase.firestore.FieldValue.serverTimestamp();
    
    for(const item of items){
      // Update inventory
      const invRef=db.collection('inventory').doc(item.name);
      batch.set(invRef,{
        [targetStore]:firebase.firestore.FieldValue.increment(item.qty),
        lastUpdated:timestamp
      },{merge:true});
      
      // Add transaction record
      const txnRef=db.collection('inventory_transactions').doc();
      batch.set(txnRef,{
        type:'purchase',
        productName:item.name,
        sku:item.sku,
        qty:item.qty,
        store:targetStore,
        price:item.price,
        total:item.qty*item.price,
        source:'invoice_upload',
        createdAt:timestamp,
        createdBy:currentUser?.email || 'unknown'
      });
    }
    
    await batch.commit();
    
    // Refresh inventory
    await loadInventory();
    
    document.getElementById('invoicePreview').innerHTML='✅ 入庫成功！已更新 '+items.length+' 款產品';
    toast('發票入庫完成');
    
  }catch(err){
    console.error('Restock error:',err);
    toast('入庫失敗：'+err.message);
  }
}
